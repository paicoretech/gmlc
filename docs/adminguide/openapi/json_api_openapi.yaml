    PolygonPoint:
      type: array
      minItems: 3
      maxItems: 15
      description: array of coordinates for point N of the Polygon type of shape (with N = 1 to 15).
      items:
        pattern: 'polygonPoint([1-9]|1[0-5])$'
        properties:
          latitude:
            type: number
            format: double
            minimum: -90.0
            maximum: 90.0
            description: |
              Expressed in the range -90º, +90º, negative decimal values refer to South degrees of latitude, while positive to North degrees of latitude.
          longitude:
            type: number
            format: double
            minimum: -180.0
            maximum: 180.0
            description: |
              Expressed in the range -180º, +180º, negative decimal values refer to West degrees of longitude, while positive to East degrees of longitude.
      example: {
        "polygonPoint5": {
          "latitude": 6.648735,
          "longitude": -75.495622
        }
      }

    VelocityEstimate:
      type: object
      properties:
        horizontalSpeed:
          type: integer
          format: int32
          description: the horizontal speed gives the magnitude of the horizontal component of the velocity of the target entity.
        bearing:
          type: integer
          format: int32
          description: provides the direction of the horizontal component of velocity taken clockwise from North.
        verticalSpeed:
          type: integer
          format: int32
          description: vertical component of the velocity of the target entity.
        uncertaintyHorizontalSpeed:
          type: integer
          format: int32
          description: uncertainty of the horizontal speed.
        uncertaintyVerticalSpeed:
          type: integer
          format: int32
          description: uncertainty of the vertical speed.
        velocityType:
          type: string
          enum:
            - HorizontalVelocity
            - HorizontalWithVerticalVelocity
            - HorizontalVelocityWithUncertainty
            - HorizontalWithVerticalVelocityAndUncertainty
      example: {
        "VelocityEstimate": {
          "horizontalSpeed": 20,
          "bearing": 0,
          "verticalSpeed": 0,
          "uncertaintyHorizontalSpeed": 0,
          "uncertaintyVerticalSpeed": 0,
          "velocityType": "HorizontalVelocity"
        }
      }

    GeranPositioningData:
      type: object
      description: If present, it lists all the positioning methods that were attempted to determine the location estimate under GERAN coverage.
      properties:
        PositioningDataSet:
          type: array
          description: an associative array of items as its value, the keys being Item-N, where N is the index of the item (0-based index), and values being maps containing `method` (String) and `usage` (Integer) fields.
          items:
            pattern: '^Item-[0-9]+$'
            properties:
              method:
                type: string
                description: The positioning method used.
                enum:
                  - Mobile Assisted GPS
                  - Mobile Based GPS
                  - Conventional GPS
                  - U-TDOA
                  - OTDOA
                  - IPDL
                  - RTT
                  - Cell ID
                  - Reserved (GERAN use only)
                  - reserved for other location technologies
                  - reserved for network specific positioning methods
              usage:
                type: integer
                minimum: 0
                maximum: 4
                description: |
                  - 0 (attempted unsuccessfully due to failure or interruption - not used)
                  - 1 (attempted successfully: results not used to generate location - not used)
                  - 2 (attempted successfully: results used to verify but not generate location - not used)
                  - 3 (attempted successfully: results used to generate location)
                  - 4 (attempted successfully: case where MS supports multiple mobile based positioning methods and the actual method or methods used by the MS cannot be determined)
      example: {
        "GeranPositioningData": {
          "PositioningDataSet": {
            "Item-0": {
              "method": "U-TDOA",
              "usage": 0
            },
            "Item-1": {
              "method": "Timing Advance",
              "usage": 3
            }
          }
        }
      }

    GeranGANSSPositioningData:
      type: object
      description: if present, it lists the positioning data set associated with a successful or unsuccessful location attempt for a target MS using Galileo and Additional Navigation Satellite Systems (GANSS) under GERAN coverage.
      properties:
        GanssPositioningDataSet:
          type: array
          description: an associative map of items with the keys being Item-N (N being the index of the item - 0-based indexing), and values being a map with three fields – `method` (String), `ganssId` (String) and `usage` (Integer).
          items:
            pattern: '^Item-[0-9]+$'
            properties:
              method:
                type: string
                description: The positioning method used.
                enum:
                  - MS-Based
                  - MS-Assisted
                  - Conventional
                  - Reserved
              ganssId:
                type: string
                description: |
                  - Galileo
                  - SBAS (Satellite Based Augmentation Systems)
                  - Modernized GPS
                  - QZSS (Quasi Zenith Satellite System)
                  - GLONASS
                  - BDS
                enum:
                  - Galileo
                  - SBAS
                  - Modernized GPS
                  - QZSS
                  - GLONASS
                  - BDS
              usage:
                type: integer
                minimum: 0
                maximum: 4
                description: |
                  - 0 (attempted unsuccessfully due to failure or interruption - not used)
                  - 1 (attempted successfully: results not used to generate location - not used)
                  - 2 (attempted successfully: results used to verify but not generate location - not used)
                  - 3 (attempted successfully: results used to generate location)
                  - 4 (attempted successfully: case where MS supports multiple mobile based positioning methods and the actual method or methods used by the MS cannot be determined)
      example: {
        "GeranGANSSPositioningData": {
          "GanssPositioningDataSet": {
            "Item-0": {
              "method": "Conventional",
              "ganssId": "SBAS",
              "usage": 4
            },
            "Item-1": {
              "method": "MS-Based",
              "ganssId": "Galileo",
              "usage": 2
            },
            "Item-2": {
              "method": "MS-Based",
              "ganssId": "Modernized GPS",
              "usage": 1
            },
            "Item-3": {
              "method": "MS-Assisted",
              "ganssId": "QZSS",
              "usage": 0
            },
            "Item-4": {
              "method": "Reserved",
              "ganssId": "BDS",
              "usage": 0
            },
            "Item-5": {
              "method": "MS-Assisted",
              "ganssId": "GLONASS",
              "usage": 3
            }
          }
        }
      }

