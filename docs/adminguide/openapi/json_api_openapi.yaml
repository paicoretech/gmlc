openapi: 3.1.0
info:
  title: PAiCore GMLC JSON API
  description: |
    <strong>PAiCore GMLC</strong> is an open source <em>Java based</em> Gateway Mobile Location Centre platform, which enables offering Location Based Services (LBS) for mobile subscribers roaming across either legacy networks such GSM/GPRS/EDGE, UMTS/HSPA+, etc., or Next Generation Networks like LTE/LTE-Advanced/LTE-Advanced-Pro and 5G. 
    <br> 
    <br>
    PAiCore GMLC strictly adheres to the <em>standards</em> and <em>specifications</em> defined by:
      * 3rd Generation Partnership Project / Long Term Evolution (3GPP/LTE)
      * International Telecommunications Union (ITU)
      * Internet Engineering Task Force (IETF) 
      * Open Mobile Alliance (OMA).
    
    GMLC stands for Gateway Mobile Location Centre and enables offering Location Based Services (LBS) to mobile subscribers roaming across several Mobile Network Operator's Radio Access Networks, regardless of the type of access (GERAN, UTRAN, E-UTRAN or 5G NR).
  
    Existing Public Land Mobile Network (PLMN) elements are proprietary and run on own operating environments located in trusted operator zones which make it difficult to build and deploy new applications. Likewise, these network elements neither provide the tools nor the interfaces needed to access and retrieve
    data from content providers over the Internet. 
    
    PAiCore GMLC connects to these network elements and enables the flow of Location Services (LCS) messages to be extended to an open, standards-based Application Server (AS) located in the IP network. The AS also provides the tools and interfaces to enable access to content providers through the Internet. A GMLC is the first node an external LCS client accesses within a PLMN.

    PAiCore GMLC supports the following MAP and Diameter-based operations for Location Services (LCS) within Mobile Network Operators control plane:
  
    **SS7 MAP ATI**: Any-Time-Interrogation, to gather subscriber information from the HLR including Cell Global Identification, age of location information and potentially other location and subscriber information parameters such as the IMEI, IMSI, MNP information, location number, VLR/MSC/SGSN SCCP addresses, MME name, base station geographic/geodetic coordinates, E-UTRAN CGI (LTE Cell ID), LTE tracking area identity, subscriber's state, GPRS routeing area identity, LSA identity, 5GS Location Information including NR-CGI (5G Cell ID), NR tracking area identity, last Radio Access Technology (RAT) type, AMF address, etc.    
    
    **SS7 MAP PSI**: Provide-Subscriber-Information, to gather subscriber information as with MAP ATI but from the MSC/VLR or SGSN is currently attached to. This MAP operation is preceded by *MAP SRISM* or *SRI* for routing it to the appropriate MSC/VLR or SGSN, thus the subscriber information gathered from PSI also contains the IMSI.
    
    **SS7 MAP SRILCS**: Send Routing Information for Location Services, to gather IMSI and core network entity address (MSC or SGSN) to which send further location request.
    
    **SS7 MAP PSL**: Provide Subscriber Location, to gather location information from the UTRAN (UMTS Terrestrial Radio Access Network), which should include, besides Cell Global Identity, location estimates in geographic coordinates of the target User Equipment, depending on available positioning methods (e.g. E-OTD, OTDOA, U-TDOA, A-GPS, etc.).
    
    **SS7 MAP SLR**: Subscriber Location Report, to gather location of a target User Equipment from the MSC or SGSN when a request for location is either implicitly administered or made at some earlier time in MAP PSL for event based deferred type of location.
    
    **Diameter SLh RIR/RIA**: Diameter SLh Routing Information Request/Answer, analogous to MAP SRILCS but over Diameter based SLh interface between GMLC and HSS.
    
    **Diameter SLg PLR/PLA**: Diameter SLg (ELP) Provide Location Request/Answer, analogous to MAP PSL but over Diameter-based Evolved Packet Core Location Protocol (ELP) SLg interface between GMLC and MME or combined MME/SGSN.
    
    **Diameter SLg LRR/LRA**: Diameter SLg (ELP) Location Report Request/Answer, analogous to MAP SLR, but over Diameter-based Evolved Packet Core Location Protocol (ELP) SLg interface between GMLC and MME or combined MME/SGSN.
    
    **Diameter Sh UDR/UDA**: Diameter Sh User-Data-Request/Answer, similar to MAP ATI, but over Diameter-based IMS Sh interface between the GMLC (acting as a SIP-AS) and the HSS.

    This document displays the REST API provided by PAiCore GMLC to its clients usually located in standards-based Application Servers in the IP network.    
    <br>
    <br>

  version: 6.0.0
  contact:
    name: Support
    url: https://paicore.tech/contact/
  license:
    name: GNU General Public License v3.0 (GPL-3.0)
    url: https://github.com/paicbd/gmlc/blob/main/LICENSE
  termsOfService: https://paicore.tech/slas/

servers:
  - url: '{protocol}://{hostname}:{port}/restcomm/gmlc/rest'
    description: Development Server
    variables:
      protocol:
        enum:
          - http
          - https
        default: http
      hostname:
        default: 127.0.0.1
      port:
        default: '8080'

security:
  - JwtAuthToken: []

paths:
  /ati:
    post:
      tags:
        - MAP ATI
      summary: SS7 MAP Any Time Interrogation (ATI) request
      description: Request subscriber information from the HLR via an SS7 MAP ATI.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MAP_ATI_Request'
            examples:
              atiRequiredOnly:
                summary: MAP ATI Request example with only required parameters
                value:
                  token: "RmVybmFuZG9NZW5kaW9yb3o"
                  msisdn: 59899077937
              atiDifferentTranslationType:
                summary: MAP ATI Request example with modified translation type
                value:
                  token: "RmVybmFuZG9NZW5kaW9yb3o"
                  msisdn: 59899077938
                  tt: 25
              atiFalseLocationInfoEps:
                summary: MAP ATI Request example with EPSLocationInformation-support flag set to false
                value:
                  token: "RmVybmFuZG9NZW5kaW9yb3o"
                  msisdn: 59899077937
                  locationInfoEps: false
              atiFalseExtraRequestedInfo:
                summary: MAP ATI Request example with unset extra requested flags (imei, ms-classmark and **mnpRequestedInfo)
                value:
                  token: "RmVybmFuZG9NZW5kaW9yb3o"
                  msisdn: 60193303030
                  extraRequestedInfo: false
              atiDomainPs:
                summary: MAP ATI Request example with domain set to ps (Packet-Switched)
                value:
                  token: "RmVybmFuZG9NZW5kaW9yb3o"
                  msisdn: 60193303030
                  domain: "ps"
      responses:
        '200':
          description: MAP ATI successfully retrieved information from the GSM/UMTS core network.
          content:
            application/json:
              examples:
                atiEpsLocationInfo:
                  summary: EPS Location Information retrieved within CS Location Information
                  value: {
                    "network": "GSM/UMTS",
                    "protocol": "MAP",
                    "operation": "ATI",
                    "result": "SUCCESS",
                    "msisdn": 59899077937,
                    "imei": "011714004661050",
                    "CSLocationInformation": {
                      "EPSLocationInformation": {
                        "ECGI": {
                          "mcc": 748,
                          "mnc": 1,
                          "eci": 520193,
                          "eNBId": 2032,
                          "ci": 1
                        },
                        "TAI": {
                          "mcc": 748,
                          "mnc": 1,
                          "tac": 109
                        },
                        "ageOfLocationInformation": 0,
                        "currentLocationRetrieved": true,
                        "mmeName": "mmec03.mmegi3000.mme.epc.mnc002.mcc748.3gppnetwork.org"
                      }
                    },
                    "subscriberState": "assumedIdle",
                    "MNPInfoResult": {
                      "mnpStatus": "ownNumberNotPortedOut",
                      "mnpMsisdn": 59899077937,
                      "mnpImsi": 748026871012345,
                      "mnpRouteingNumber": "598123"
                    }
                  }
                atiCsLocationInfo:
                  summary: CS Location and MNP information retrieved
                  value: {
                    "network": "GSM/UMTS",
                    "protocol": "MAP",
                    "operation": "ATI",
                    "result": "SUCCESS",
                    "msisdn": 59899077937,
                    "imei": "011714004661050",
                    "CSLocationInformation": {
                      "LocationNumber": {
                        "oddFlag": false,
                        "natureOfAddressIndicator": 4,
                        "internalNetworkNumberIndicator": 1,
                        "numberingPlanIndicator": 1,
                        "addressPresentationRestrictedIndicator": 1,
                        "screeningIndicator": 3,
                        "address": 819203961904
                      },
                      "CGI": {
                        "mcc": 748,
                        "mnc": 1,
                        "lac": 101,
                        "ci": 10263
                      },
                      "saiPresent": false,
                      "GeographicalInformation": {
                        "typeOfShape": "EllipsoidPointWithUncertaintyCircle",
                        "latitude": -34.909734,
                        "longitude": -56.146317,
                        "uncertainty": 3.0
                      },
                      "ageOfLocationInformation": 0,
                      "currentLocationRetrieved": true,
                      "vlrNumber": 59899000231,
                      "mscNumber": 59899000231
                    },
                    "subscriberState": "assumedIdle",
                    "MNPInfoResult": {
                      "mnpStatus": "ownNumberNotPortedOut",
                      "mnpMsisdn": 59899077937,
                      "mnpImsi": 748026871012345,
                      "mnpRouteingNumber": "598123"
                    }
                  }
                atiPsLocationInfo:
                  summary: PS Location Information retrieved
                  value: {
                    "network": "GSM/UMTS",
                    "protocol": "MAP",
                    "operation": "ATI",
                    "result": "SUCCESS",
                    "msisdn": 59899077937,
                    "imei": "011714004661051",
                    "PSLocationInformation": {
                      "CGI": {
                        "mcc": 748,
                        "mnc": 10,
                        "lac": 9501,
                        "ci": 35100
                      },
                      "saiPresent": false,
                      "RAI": {
                        "mcc": 748,
                        "mnc": 1,
                        "lac": 101,
                        "rac": 23
                      },
                      "LSA": {
                        "lsaIdType": "Universal",
                        "lsaId": "131"
                      },
                      "GeodeticInformation": {
                        "typeOfShape": "EllipsoidPointWithUncertaintyCircle",
                        "latitude": -34.905614,
                        "longitude": -55.042191,
                        "uncertainty": 3.31,
                        "confidence": 10,
                        "screeningAndPresentationIndicators": 3
                      },
                      "ageOfLocationInformation": 0,
                      "currentLocationRetrieved": true,
                      "sgsnNumber": 5982133021
                    },
                    "subscriberState": "psAttachedReachableForPaging"
                  }
                atiEps5GsLocationInfo:
                  summary: EPS and 5GS Location information retrieved
                  value: {
                    "network": "GSM/UMTS",
                    "protocol": "MAP",
                    "operation": "ATI",
                    "result": "SUCCESS",
                    "msisdn": 59899077937,
                    "imei": "011714004661050",
                    "EPSLocationInformation": {
                      "ECGI": {
                        "mcc": 748,
                        "mnc": 1,
                        "eci": 614146,
                        "eNBId": 2399,
                        "ci": 2
                      },
                      "TAI": {
                        "mcc": 748,
                        "mnc": 1,
                        "tac": 109
                      },
                      "ageOfLocationInformation": 0,
                      "currentLocationRetrieved": true,
                      "mmeName": "mmec03.mmegi3000.mme.epc.mnc002.mcc748.3gppnetwork.org"
                    },
                    "5GSLocationInformation": {
                      "NCGI": {
                        "mcc": 748,
                        "mnc": 1,
                        "nci": 42949672954
                      },
                      "NR-TAI": {
                        "mcc": 748,
                        "mnc": 1,
                        "tac": 595578
                      },
                      "ECGI": {
                        "mcc": 748,
                        "mnc": 1,
                        "eci": 614146,
                        "eNBId": 2399,
                        "ci": 2
                      },
                      "TAI": {
                        "mcc": 748,
                        "mnc": 1,
                        "tac": 109
                      },
                      "GeodeticInformation": {
                        "typeOfShape": "EllipsoidPointWithUncertaintyCircle",
                        "latitude": -34.910345,
                        "longitude": -56.149814,
                        "uncertainty": 1.0,
                        "confidence": 2,
                        "screeningAndPresentationIndicators": 1
                      },
                      "amfAddress": "amf1.cluster1.net2.amf.5gc.mnc01.mcc748.3gppnetwork.org",
                      "ageOfLocationInformation": 0,
                      "currentLocationRetrieved": true,
                      "VPLMN-ID": {
                        "mcc": 748,
                        "mnc": 1
                      },
                      "Used-RAT-Type": {
                        "ratType": "nbIot"
                      }
                    },
                    "subscriberState": "assumedIdle"
                  }
              schema:
                $ref: "#/components/schemas/MAP_ATI_Response"
        '400':
          description: Bad Request
          content:
            application/json:
              example: {
                "network": "GSM/UMTS",
                "protocol": "MAP",
                "operation": "ATI",
                "msisdn": 59899012456,
                "result": "ERROR",
                "errorReason": "[Incorrect domain argument, must be one of CS or PS]"
              }
        '401':
          description: Unauthorized
          content:
            application/json:
              example: {
                "network": "GSM/UMTS",
                "protocol": "MAP",
                "operation": "ATI",
                "msisdn": 59898012456,
                "result": "ERROR",
                "errorReason": "[Authentication error, invalid token]"
              }
        '404':
          description: Not Found (e.g., the subscriber is not found in the HLR)
          content:
            application/json:
              example: {
                "network": "GSM/UMTS",
                "protocol": "MAP",
                "operation": "ATI",
                "msisdn": 59899124567,
                "networkNodeNumber": 598000000123,
                "result": "ERROR",
                "errorReason": "[MAP Component error: Unknown Subscriber, MAP error code value: 1]"
              }
        '408':
          description: Request timeout (e.g., a TCAP invoke timeout)
          content:
            application/json:
              example: {
                "network": "GSM/UMTS",
                "protocol": "MAP",
                "operation": "ATI",
                "msisdn": 60196123456,
                "result": "ERROR",
                "errorReason": "[Invoke timeout]"
              }
        '503':
          description: Service Unavailable
          content:
            application/json:
              example: {
                "network": "GSM/UMTS",
                "protocol": "MAP",
                "operation": "ATI",
                "msisdn": 60196123456,
                "result": "ERROR",
                "errorReason": "[Rejected, event type: ss7.map.REJECT_COMPONENT, invoke problem: ResourceLimitation]"
              }

