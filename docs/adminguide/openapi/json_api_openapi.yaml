          "mnc": 123
        }
      }

    LocalTimeZone:
      type: object
      description: time zone at the location of the target subscriber
      properties:
        timeZone:
          type: string
          description: time zone defined by the standard offset from Coordinated Universal Time (UTC)
        daylightSavingTime:
          type: integer
          format: int32
          description: daylight saving time in shift units
      example: {
        "LocalTimeZone": {
          "timeZone": "-5",
          "daylightSavingTime": 1
        }
      }

    Used-RAT-Type:
      type: object
      description: |
        if present, it shall contain the **Radio Access Technology (RAT) type** used by the target subscriber.
        <br />
        `ratType` field can assume any of the following values:
        - **MAP ATI or PSI** ->  `utran`, `geran`, `gan`, `iHspaEvolution`, `eUtran` or `nbIoT`
        - **Diameter Sh UDA** -> `WLAN`, `VIRTUAL`, `UTRAN`,`GERAN`,`GAN`,`HSPA_EVOLUTION`,`EUTRAN`,`EUTRAN-NB-IoT`,`NR`,`LTE-M`,`CDMA2000_1X`,`HRPD`,`UMB` or `EHRPD`.
      properties:
        ratType:
          type: string
          enum:
            - utran
            - geran
            - gan
            - iHspaEvolution
            - eUtran
            - nbIoT
            - WLAN
            - VIRTUAL
            - UTRAN
            - GERAN
            - GAN
            - HSPA_EVOLUTION
            - EUTRAN
            - EUTRAN-NB-IoT
            - NR
            - LTE-M
            - CDMA2000_1X
            - HRPD
            - UMB
            - EHRPD
      example: {
        "Used-RAT-Type": {
          "RAT": "eUtran"
        }
      }

    ratType:
      type: string
      description: radio access technology. Possible values for MAP ATI or MAP PSI are [ utran, geran, gan, iHspaEvolution, eUtran, nbIoT ]. Possible values for Sh UDR/UDA are [ WLAN, VIRTUAL, UTRAN, GERAN, GAN, HSPA_EVOLUTION, EUTRAN, EUTRAN-NB-IoT, NR, LTE-M, CDMA2000_1X, HRPD, UMB, EHRPD ]
      example: {
        "ratType": "GERAN"
      }

    GeographicalInformation:
      type: object
      description: location information around `geographical coordinates` (latitude and longitude) from angular measurements from the Earth's equator and prime meridian. This information refers to the base-station geographical information and may be retrieved from the MSC/VLR, SGSN, MME or AMF.
      properties:
        typeOfShape:
          enum:
            - EllipsoidPointWithUncertaintyCircle
          description: it can only be `EllipsoidPointWithUncertaintyCircle` for SS7 MAP ATI or MAP PSI, as well as for Diameter Sh UDR/UDA.
        latitude:
          type: number
          format: double
          description: expressed in the range -90&#186;, +90&#186;, negative decimal values refer to South degrees of latitude, while positive to North degrees of latitude.
        longitude:
          type: number
          format: double
          description: expressed in the range -180&#186;, +180&#186;, negative decimal values refer to West degrees of longitude, while positive to East degrees of longitude.
        uncertainty:
          type: number
          format: double
          description: method of describing the uncertainty for latitude and longitude (in metres).
      example: {
        "GeographicalInformation": {
          "typeOfShape": "EllipsoidPointWithUncertaintyCircle",
          "latitude": -34.909734,
          "longitude": -56.146317,
          "uncertainty": 1.0
        }
      }

    GeodeticInformation:
      type: object
      description: location information around ellipsoidal coordinates based on a more realistic model of the Earth and a reference frame. This information refers to the serving base-station geodetic information and may be retrieved from the MSC/VLR, SGSN, MME or AMF.
      properties:
        typeOfShape:
          enum:
            - EllipsoidPointWithUncertaintyCircle
          description: it can only be `EllipsoidPointWithUncertaintyCircle` for SS7 MAP ATI or MAP PSI, as well as for Diameter Sh UDR/UDA.
        latitude:
          type: number
          format: double
          description: expressed in the range -90&#186;, +90&#186;, negative decimal values refer to South degrees of latitude, while positive to North degrees of latitude.
        longitude:
          type: number
          format: double
          description: expressed in the range -180&#186;, +180&#186;, negative decimal values refer to West degrees of longitude, while positive to East degrees of longitude.
        confidence:
          type: number
          format: double
          description: confidence by which the position of a target entity is known to be within the shape description (expressed as a percentage).
        screeningAndPresentationIndicators:
          type: integer
          format: int32
          description: indicators for _allowed_ (`0`) or _restricted_ (`1`) geodetic info and if it is user (`2`) or network provided (`3`).
      example: {
        "GeodeticInformation": {
          "typeOfShape": "EllipsoidPointWithUncertaintyCircle",
          "latitude": -34.910345,
          "longitude": -56.149814,
          "uncertainty": 1.0,
          "confidence": 10,
          "screeningAndPresentationIndicators": 3
        }
      }

    CSLocationInformation:
      type: object
      description: Comprises the location information retrieved from the Circuit-Switched (CS) network.
      properties:
        LocationNumber:
          $ref: '#/components/schemas/LocationNumber'
        CGI:
          $ref: '#/components/schemas/CGI'
        SAI:
          $ref: '#/components/schemas/SAI'
        LAI:
          $ref: '#/components/schemas/LAI'
