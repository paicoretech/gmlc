    DeferredMTLRDataMAP:
      type: object
      description: data obtained for deferred Mobile Terminated Location Requests (MT-LR), if and only if **lcsEvent**=`DEFERRED_MT_LR_RESPONSE`. This parameter is used to report the deferred location event type, the location information and reason why the serving node aborted monitoring the event to the GMLC. The termination cause mt-lrRestart shall be used to trigger the GMLC to restart the location procedure in all the cases where the sending node detects that the location procedure cannot be successfully performed anymore by the sending node and that it could be successfully performed by another node. The location information shall be included only if the termination cause is mt-lrRestart. The network node number contained in the location information refers to the node where the MS/UE has moved to and shall be included if available (e.g, the MS/UE has been correctly registered)
      properties:
        deferredLocationEventType:
          type: string
          description: |
            type of event of the deferred MT-LR data.
            Possible values include those related to:
            - **availability**: `MS-AVAILABLE`
            - **area events reports**: `ENTERING_INTO_AREA`, `LEAVING_FROM_AREA` or `BEING_INSIDE_AREA`
            - **periodic location deferred reports**: `PERIODIC_LDR`
          enum:
            - MS-AVAILABLE
            - ENTERING_INTO_AREA
            - LEAVING_FROM_AREA
            - BEING_INSIDE_AREA
            - PERIODIC_LDR
        terminationCause:
          type: string
          description: The MT location report termination cause.
          enum:
            - NORMAL
            - ERROR_UNDEFINED
            - INTERNAL_TIMEOUT
            - CONGESTION
            - MT_LR_RESTART
            - PRIVACY_VIOLATION
            - SHAPE_OF_LOCATION_ESTIMATE_NOT_SUPPORTED
            - SUBSCRIBER_TERMINATION
            - UE_TERMINATION
            - NETWORK_TERMINATION
        LCSLocationInfo:
          $ref: '#/components/schemas/LCSLocationInfo'
      example: {
        "DeferredMTLRData": {
          "deferredLocationEventType": "MS_AVAILABLE",
          "terminationCause": "MT_LR_RESTART",
          "LCSLocationInfo": {
            "gprsNodeIndicator": false,
            "networkNodeNumber": 59899180071,
            "SupportedLCSCapabilitySets": {
              "release98_99": true,
              "release4": true,
              "release5": false,
              "release6": false,
              "release7": false
            },
            "AdditionalLCSCapabilitySets": {
              "release98_99": true,
              "release4": true,
              "release5": true,
              "release6": true,
              "release7": false
            }
          }
        }
      }

    DeferredMTLRDataSLg:
      type: object
      description: data obtained for deferred Mobile Terminated Location Requests (MT-LR), if and only if **lcsEvent**=`DEFERRED_MT_LR_RESPONSE`. This parameter is used to report the deferred location event type, the location information and reason why the serving node aborted monitoring the event to the GMLC. The termination cause mt-lrRestart shall be used to trigger the GMLC to restart the location procedure in all the cases where the sending node detects that the location procedure cannot be successfully performed anymore by the sending node and that it could be successfully performed by another node. The location information shall be included only if the termination cause is mt-lrRestart. The network node number contained in the location information refers to the node where the MS/UE has moved to and shall be included if available (e.g, the MS/UE has been correctly registered).
      properties:
        deferredLocationEventType:
          type: string
          description: |
            type of event of the deferred MT-LR data.
            Possible values include those related to: 
            - **availability**: `UE-AVAILABLE`
            - **area events reports**: `ENTERING_INTO_AREA`, `LEAVING_FROM_AREA` or `BEING_INSIDE_AREA`
            - **periodic location deferred reports**: `PERIODIC_LDR`, `LDR_ACTIVATED` or `MAXIMUM_INTERVAL_EXPIRATION`
            - **motion event reports**: `MOTION_EVENT`.
          enum:
            - UE-AVAILABLE
            - ENTERING_INTO_AREA
            - LEAVING_FROM_AREA
            - BEING_INSIDE_AREA
            - PERIODIC_LDR
            - LDR_ACTIVATED
            - MAXIMUM_INTERVAL_EXPIRATION
            - MOTION_EVENT
        terminationCause:
          type: string
          description: The MT location report termination cause.
          enum:
            - NORMAL
            - ERROR_UNDEFINED
            - INTERNAL_TIMEOUT
            - CONGESTION
            - MT_LR_RESTART
            - PRIVACY_VIOLATION
            - SHAPE_OF_LOCATION_ESTIMATE_NOT_SUPPORTED
            - SUBSCRIBER_TERMINATION
            - UE_TERMINATION
            - NETWORK_TERMINATION
        ServingNode:
          $ref: '#/components/schemas/ServingNode'
      example: {
        "DeferredMTLRData": {
          "deferredLocationType": "LEAVING_FROM_AREA",
          "terminationCause": "MT_LR_RESTART",
          "ServingNode": {
            "mmeName": "mmeC19.mmegi8001.mme.epc.mnc109.mcc502.3gppnetwork.org",
            "mmeRealm": "epc.mnc109.mcc502.3gppnetwork.org",
            "mscNumber": 5989900008,
            "lcsCapabilitySets": "release6",
            "gmlcAddress": "200.123.44.109"
          }
        }
      }

    DelayedLocationReportingData:
      type: object
      description: Used to report the reason why the serving node ended an earlier EPC-MT-LR or PS-MT-LR with the Delayed-Location-Reporting-Support indication received for a UE transiently not reachable.
      properties:
        terminationCause:
          type: string
          description: The MT location report termination cause.
          enum:
            - NORMAL
            - ERROR_UNDEFINED
            - INTERNAL_TIMEOUT
            - CONGESTION
            - MT_LR_RESTART
            - PRIVACY_VIOLATION
            - SHAPE_OF_LOCATION_ESTIMATE_NOT_SUPPORTED
            - SUBSCRIBER_TERMINATION
            - UE_TERMINATION
            - NETWORK_TERMINATION
        ServingNode:
          $ref: '#/components/schemas/ServingNode'
      example: {
        "DelayedLocationReportingData" : {
          "terminationCause" : "MT_LR_RESTART",
          "ServingNode" : {
            "sgsnName" : "sgsn19.sgsn.mnc109.mcc502.gprs",
            "sgsnRealm" : "mnc109.mcc502.gprs",
            "sgsnNumber" : 5989900024,
            "lcsCapabilitySets" : "release6",
            "gmlcAddress" : "200.123.44.10"
          }
        }
      }

  parameters:
    #Diameter SLg LRR
    #    lcsEvent:
    #      name: lcsEvent
    #      in: query
    #      required: true
    #      description: the event that triggered the Subscriber Location Report
    #      schema:
    #        type: integer
    #        minimum: 0
    #        maximum: 7
    msisdn:
      name: msisdn
      in: query
      required: true
      description: ITU-T E.164 digits of the subscriber’s MS/UE that’s generated the location report
      schema:
        type: integer
        format: int64
    lcsReferenceNumber:
      name: lcsReferenceNumber
      in: query
      required: true
      description: the reference number identifying the deferred location request. Significantly important for deferred EPC-MT-LR procedures, when the report can arrive hours or even days after the initial MAP PSL response or Diameter SLg PLA.
      schema:
        type: integer
        format: int32
    clientReferenceNumber:
      name: clientReferenceNumber
      in: query
      required: true
      description: Reference number with significance only for the GMLC Client that triggered the location report.
      schema:
        type: integer
        format: int32

  securitySchemes:
    JwtAuthToken:
      type: http
      scheme: bearer
      bearerFormat: JWT