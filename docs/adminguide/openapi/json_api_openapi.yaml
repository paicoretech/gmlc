          description: if present, it contains the time (measured in minutes) since the location information was gathered (shall be 0 if current location has been retrieved).
        currentLocationRetrieved:
          type: boolean
          description: If present, it reveals if the location information retrieved is the current one.
        vlrNumber:
          type: integer
          format: int64
          description: If present, it contains the VLR Global Title (E.164) digits at which the target subscriber is attached to.
        mscNumber:
          type: integer
          format: int64
          description: If present, it contains the MSC Global Title (E.164) digits at which the target subscriber is attached to.
        mmeName:
          type: string
          description: If present, it comprises a string which contains the LTE EPC MME node's host name (MME-Name) in a format consistent with the Network Access Identifier (NAI) specification.
