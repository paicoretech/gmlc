    ServingNode:
      type: object
      description: Serving node providing service to the target subscriber.
      properties:
        mmeName:
          type: string
          description: if present, it comprises a string which contains the LTE EPC MME node’s host name (MME-Name) in a format consistent with the Network Access Identifier (NAI) specification.
        mmeRealm:
          type: string
          description: if present, it comprises a string which contains the LTE/EPC MME (Mobility Management Entity) node’s realm (MME-realm) in a format consistent with the Network Access Identifier (NAI) specification.
        sgsnNumber:
          type: integer
          format: int64
          description: if present, it contains the SGSN Global Title (E.164) digits at which the target subscriber is attached to.
        sgsnName:
          type: string
          description: if present, it comprises a string which contains the GPRS SGSN node’s name (SGSN-Name) in a format consistent with the Network Access Identifier (NAI) specification.
        sgsnRealm:
          type: string
          description: if present, it comprises a string which contains the GPRS SGSN node’s realm (SGSN-Realm) in a format consistent with the Network Access Identifier (NAI) specification.
        mscNumber:
          type: integer
          format: int64
          description: if present, it contains the MSC Global Title (E.164) digits at which the target subscriber is attached to.
        3GPPAAAServerName:
          type: string
          description: if present, it comprises a string which contains the 3GPP AAA Server name in a format consistent with the Network Access Identifier (NAI) specification.
        gmlcAddress:
          type: string
          description: if present, it contains the GMLC IP address.
          example: 191.32.101.7
        lcsCapabilitySets:
          type: string
          description: LCS capability sets as per 3GPP specification releases.
          enum:
            - release98_99
            - release4
            - release5
            - release6
            - release7
      example: {
        "ServingNode": {
          "mmeName": "mmeshn033.mmegi800.mme.epc.mnc732.mcc942.3gppnetwork.org",
          "mmeRealm": "epc.mnc135.mcc732.3gppnetwork.org",
          "mscNumber": 5730100003,
          "lcsCapabilitySets": "release7",
          "gmlcAddress": "191.42.21.204"
        }
      }

    LCSLocationInfo:
      type: object
      description: Serving node providing service to the target subscriber. When part of **DeferredMTLRData** parameter, should only be present if **terminationCause** equals `MT_LR_RESTART`.
      properties:
        networkNodeNumber:
          type: integer
          format: int64
          description: Global Title (E.164) digits of the network node where the target subscriber is attached to.
        gprsNodeIndicator:
          type: boolean
          description: Indicates if the `networkNodeNumber` is an SGSN (true).
        additionalNetworkNodeNumber:
          type: integer
          format: int64
          description: if present, it contains the Global Title (E.164) digits of the network entity at which the target subscriber may also be attached to. It must be a different entity than the `Network Node Number`, for example, if the latter is the VLR, the `Additional Network Node Number` may be the SGSN.
        SupportedLCSCapabilitySets:
          $ref: '#/components/schemas/SupportedLCSCapabilitySets'
        AdditionalLCSCapabilitySets:
          $ref: '#/components/schemas/AdditionalLCSCapabilitySets'
        mmeName:
          type: string
          description: if present, it comprises a string which contains the LTE EPC MME node’s host name (MME-Name) in a format consistent with the Network Access Identifier (NAI) specification.
        3GPPAAAServerName:
          type: string
          description: if present, it comprises a string which contains the 3GPP AAA Server name in a format consistent with the Network Access Identifier (NAI) specification.
        sgsnName:
          type: string
          description: if present, it comprises a string which contains the GPRS SGSN node’s name (SGSN-Name) in a format consistent with the Network Access Identifier (NAI) specification.
        sgsnRealm:
          type: string
          description: if present, it comprises a string which contains the GPRS SGSN node’s realm (SGSN-Realm) in a format consistent with the Network Access Identifier (NAI) specification.

