components:
  schemas:
    ########################
    ### REQUEST Schemas ###
    ########################

    ## MAP ATI Request ##
    MAP_ATI_Request:
      description: |
        SS7 MAP Any Time Interrogation (ATI) request.
        <br />
        Used to request subscriber information from the HLR in a GSM/UMTS core network.
      oneOf:
        - type: object
          required: [ msisdn ]
          properties:
            msisdn:
              type: integer
              format: int64
              description: ITU-T E.164 digits of the target subscriber. Required if **imsi** is *absent*.
        - type: object
          required: [ imsi ]
          properties:
            imsi:
              type: integer
              format: int64
              description: ITU-T E.212 digits (IMSI) of the target subscriber. Required if **msisdn** is *absent*.
      required:
        - token
      properties:
        msisdn:
          type: integer
          format: int64
          description: ITU-T E.164 digits of the target subscriber.
        token:
          type: string
          description: Authentication token. Must match **curltoken** on *GmlcManagement_gmlcproperties.xml* file or the **token** in the MongoDB database within the *curl-account* collection.
        domain:
          type: string
          enum:
            - ps
            - cs
          description: PS (Packet-Switched) or CS (Circuit-Switched)
          default: cs
        locationInfoEps:
          type: boolean
          default: true
          description: |
            Set **locationInformationEPS-Supported** flag.
        extraRequestedInfo:
          type: boolean
          default: true
          description: |
            Set **imei**, **ms-classmark** and **mnpRequestedInfo** flags within MAP ATI requested information. Must be set to **false** if the *HLR* does not accept those parameters in MAP ATI requests.
        tt:
          type: integer
          format: int32
          minimum: 0
          maximum: 255
          default: 0
          description: |
            **Translation Type** value to be assigned to the SCCP Called Party Address Global Title of the HLR.
        httpRespType:
          type: string
          enum:
            - plain
            - json
          default: json
          description: |
            For retro-compatibility with the community version (only available for MAP ATI). To be deprecated soon.

    ## MAP ATI Response ##
    MAP_ATI_Response:
      type: object
      allOf:
        - type: object
          properties:
            network:
              type: string
              description: Only value for MAP ATI is `GSM/UMTS` (informative only).
              example: GSM/UMTS
            protocol:
              type: string
              description: Only value for MAP ATI is `MAP` (informative only).
              example: MAP
            operation:
              type: string
              description: Only value for MAP ATI is `ATI` (informative only).
              example: ATI
            msisdn:
              type: integer
              format: int64
              description: ITU-T E.164 digits of the target subscriber.
        - $ref: '#/components/schemas/MAP_ATI_PSI_Response_shared_params'


    ## MAP PSI Request ##
    MAP_PSI_Request:
      description: |
        SS7 MAP Provide Subscriber Information (PSI) request.
        <br />
        Used to request subscriber information from the MSC/VLR or SGSN in a GSM/UMTS core network.
      required:
        - msisdn
        - token
      properties:
        msisdn:
          type: integer
          format: int64
          description: ITU-T E.164 digits of the target subscriber.
        token:
          type: string
          description: Authentication token. Must match **curltoken** on *GmlcManagement_gmlcproperties.xml* file or the **token** in the MongoDB database within the *curl-account* collection.
        domain:
          type: string
          enum:
            - ps
            - cs
          description: PS (Packet-Switched) or CS (Circuit-Switched)
          default: cs
        locationInfoEps:
          type: boolean
          default: true
          description: |
            Set **locationInformationEPS-Supported** flag.
        extraRequestedInfo:
          type: boolean
          default: true
          description: |
            Set **imei**, **ms-classmark** and **mnpRequestedInfo** flags within MAP ATI requested information. Must be set to **false** if the *HLR* does not accept those parameters in MAP ATI requests.
        tt:
          type: integer
          format: int32
          minimum: 0
          maximum: 255
          default: 0
          description: |
            **Translation Type** value to be assigned to the SCCP Called Party Address Global Title of the HLR.
        psiServiceType:
          type: string
          enum:
            - useSriSm
            - useSri
            - psiFirst
          default: useSriSm
          description: |
            - Set to **useSriSm** for sending *MAP SRISM* prior to MAP PSI.
            - Set to **useSri** to send *MAP SRI* prior to MAP PSI.
            - Set to **psIFirst** to not send any operation prior to MAP PSI.
        psiImsi:
          type: integer
          format: int64
          description: |
            ITU-T E.212 (IMSI) digits of the target subscriber. If **absent**, SRISM will be sent prior to MAP PSI.
        psiNN:
          type: integer
          format: int64
          description: |
            Address of the network entity at which the target subscriber is attached to (e.g., GT digits of the serving MSC/VLR). If **absent**, SRISM will be sent prior to MAP PSI.

    ## MAP PSI Response ##
    MAP_PSI_Response:
      type: object
      allOf:
        - type: object
          properties:
            network:
              type: string
              description: Only value for MAP PSI is `GSM/UMTS` (informative only).
              enum: [ GSM/UMTS ]
            protocol:
              type: string
              description: Only value for MAP PSI is `MAP` (informative only).
              example: MAP
            operation:
              type: string
              description: Only value for MAP PSI is `PSI` (informative only).
              example: PSI
            imsi:
              type: integer
              format: int64
              description: ITU-T E.212 digits (IMSI) of the target subscriber.
            lmsi:
              type: integer
              format: int32
              description: if present, it contains the `temporary identification` that is assigned to the target subscriber's UE for security.
        - $ref: '#/components/schemas/MAP_ATI_PSI_Response_shared_params'

    ## SRILCS-PSL Request ##
    MAP_SRILCS_PSL_Request:
      description: |
        SS7 MAP Send Routing Information for Location Services (SRILCS) - Provide Subscriber Location (PSL) request
        <br />
        Request subscriber location information from the MSC/VLR or SGSN via a SS7 MAP PSL after a previous SS7 MAP Send Routing Information for Location Services (SRILCS) request in a GSM/UMTS core network.
      oneOf:
        - type: object
          required: [ msisdn ]
          properties:
            msisdn:
              type: integer
              format: int64
              description: ITU-T E.164 digits of the target subscriber. Required if **imsi** is *absent*.
        - type: object
          required: [ imsi ]
          properties:
            imsi:
              type: integer
              format: int64
              description: ITU-T E.212 digits (IMSI) of the target subscriber. Required if **msisdn** is *absent*.
      required:
        - token
        - lcsLocationType
        - lcsClientType
        - clientReferenceNumber
      properties:
        token:
          type: string
          description: Authentication token. Must match **curltoken** on *GmlcManagement_gmlcproperties.xml* file or the **token** in the MongoDB database within the *curl-account* collection.
        lcsLocationType:
          type: string
          description: Type of location request required.
          enum:
            - currentLocation
            - currentOrLastKnownLocation
            - initialLocation
            - activateDeferredLocation
            - cancelDeferredLocation
            - notificationVerificationOnly.
        lcsClientType:
          type: integer
          minimum: 0
          maximum: 3
          description: |
            Location service client type.
            - `0` -> emergency services.
            - `1` -> value-added services
            - `2` -> PLMN operator services
            - `3` -> lawful interception
        clientReferenceNumber:
          type: integer
          format: int64
          description: A reference number with significance only for the GMLC client.
        lcsDeferredLocationType:
          type: string
          description: |
            Type of area or periodic event, when the location estimation is deferred.
            - **available** -> for MS available events.
            - **inside**, **entering**, **leaving** -> for area event reports (geofencing).
            - **periodicLDR** -> for deferred periodic location reports.
          enum:
            - available
            - inside
            - entering
            - leaving
            - periodicLDR
        lcsClientExternalID:
          type: integer
          format: int64
          description: |
            LCS Client External Identity.<br /> **Required** when *lcsClientType* equals <br />`0` (emergency services) or <br />`1` (value-added services).<br />**16** digits max.
        lcsClientName:
          type: string
          description: Name of the LCS Client, an UTF8 string consistent with its format indicator.
        lcsClientFormatIndicator:
          type: integer
          minimum: 0
          maximum: 4
          description: |
            Type of the LCS Client name format.
            - `0` -> logical name
            - `1` -> email address
            - `2` -> msisdn
            - `3` -> url
            - `4` -> SIP URL
        lcsRequestorId:
          type: string
          description: Identification of the requestor, an UTF8 string consistent with its format indicator.
        lcsRequestorFormatIndicator:
          type: integer
          minimum: 0
          maximum: 4
          description: |
            Format of the *lcsRequestorId* parameter.
            - `0` -> logical name
            - `1` -> email address
            - `2` -> msisdn
            - `3` -> url
            - `4` -> SIP url
        lcsReferenceNumber:
          type: integer
          format: int64
          description: Correlation reference number between a request and a response of a deferred Mobile Terminating Location Request procedure (MT-LR) sent by the GMLC to the core network destination entity (MSC/VLR or SGSN).
        horizontalAccuracy:
          type: integer
          minimum: 0
          maximum: 127
          description: Requested horizontal location accuracy. Governed by the equation `r=C((1+x)^k -1)` with **C = 10** and **x = 0,1**. With **0 ⇐ K ⇐ 127**, a suitably useful range between `0` and `1800` kilometres. The horizontal location error should be less than the error indicated by the **uncertainty code (r)** with **67% confidence**.
        verticalAccuracy:
          type: integer
          minimum: 0
          maximum: 127
          description: Requested vertical location accuracy. Governed by the equation `h=C((1+x)^k -1)`, with **C = 45** and **x = 0,025**. With **0 ⇐ K ⇐ 127**, a suitably useful range between `0` and `990.5` kilometres. The horizontal location error should be less than the error indicated by the **uncertainty code (h)** with **67% confidence**.
        verticalCoordinateRequest:
          type: boolean
          default: false
          description: Indication if the vertical coordinate is requested.
        responseTime:
          type: string
          enum:
            - lowdelay
            - delaytolerant
          description: Urgency of the location request.
        lcsPriority:
          type: string
          enum:
            - highestPriority
            - normalPriority
          description: Location request prioritization.
        lcsServiceTypeId:
          type: integer
          minimum: 0
          maximum: 127
          description: Service type identity of the location service.
        lcsAreaType:
          type: string
          description: Area type of area events.
          enum:
            - countryCode
            - plmnId
            - locationAreaId
            - routingAreaId
            - cellGlobalId
            - utranCellId
        lcsAreaId:
          type: string
          description: |
            String representation of the identity of the indicated area type.
            <br />
            <br />
            Must contain the area identity parameters used for geofencing location reports, separated by a hyphen. For example, for the cellGlobalId area type, a valid value would be `502-19-3081-33045` for **MCC=502**, **MNC=19**, **LAC=3081** and **CI=33045**.
        lcsAreaEventOccurrenceInfo:
          type: string
          enum:
            - oneTimeEvent
            - multipleTimeEvent
          description: The eventuality occurrence amount of an area event.
        lcsAreaEventIntervalTime:
          type: integer
          minimum: 1
          maximum: 32767
          description: Minimum time interval between area reports (in seconds).
        reportingAmount:
          type: integer
          minimum: 1
          maximum: 8639999
          description: Amount of periodic location deferred reports.
        reportInterval:
          type: integer
          minimum: 1
          maximum: 8639999
          description: Time interval between periodic location deferred reports (in seconds).
        lcsVisitedPLMNId:
          type: string
          description: |
            ID of the visited PLMN.
            <br />
            <br />
            Must contain the corresponding **MCC** and **MNC** parameters separated by a hyphen, for example: `748-1`.
        lcsVisitedPLMNIdRAN:
          type: integer
          minimum: 0
          maximum: 1
          description: |
            Type of Radio Access Network.
            <br />
            <br />
            - `0` -> GSM
            - `1` -> UMTS
        lcsPeriodicLocationSupportIndicator:
          type: integer
          minimum: 0
          maximum: 1
          description: |
            Indicates if the given `PLMN-ID` supports periodic location or not.
            - `0` -> not supported
            - `1` -> supported
        lcsPrioritizedListIndicator:
          type: integer
          minimum: 0
          maximum: 1
          description: |
            Indicates if the PLMN-ID-List is provided in prioritized order or not.
        imei:
          type: string
          description: |
            International Mobile Equipment Identity (IMEI) of the target subscriber as specified by 3GPP TS 23.003. Comprised of `14` or `15` digits.
        lcsCallbackUrl:
          type: string
          description: |
            URL to send the Subscriber Location Report. If *absent*, it defaults to the value set in the correspondent **configuration file**.
        tt:
          type: integer
          default: 0
          minimum: 0
          maximum: 255
          description: |
            Translation Type value to be assigned to the SCCP Called Party Address Global Title (HLR, MSC, VLR or SGSN).

    ## MAP SRILCS Response ##
    MAP_SRILCS_Response:
      type: object
      properties:
        msisdn:
          type: integer
          format: int64
          description: ITU-T E.164 digits of the target subscriber.
        imsi:
          type: integer
          format: int64
          description: ITU-T E.212 digits (IMSI) of the target subscriber.
        lmsi:
          type: integer
          format: int32
          description: if present, it contains the `temporary identification` that is assigned to the target subscriber's UE for security.
        LCSLocationInfo:
          $ref: '#/components/schemas/LCSLocationInfo'
        vGmlcAddress:
          type: string
          description: if present, it contains the GMLC IP address residing at the visited network (V-PLMN).
          example: 200.10.21.34
        hGmlcAddress:
          type: string
          description: if present, it contains the GMLC IP address residing at the home network (H-PLMN).
          example: 191.32.101.7
        pprAddress:
          type: string
          description: if present, it contains the Privacy Profile Register (PPR) IP address.
          example: 191.32.102.17
        addVGmlcAddress:
          type: string
          description: if present, it contains the additional GMLC IP address residing at the visited network (V-PLMN).
          example: 200.10.21.34
      example: {
        "SRILCS": {
          "msisdn": 59899077937,
          "imsi": 748026871012345,
          "LCSLocationInfo": {
            "networkNodeNumber": 598991800024,
            "gprsNodeIndicator": true,
            "additionalNetworkNodeNumber": 598992000077,
            "SupportedLCSCapabilitySets": {
              "release98_99": true,
              "release4": true,
              "release5": true,
              "release6": false,
              "release7": false
            },
            "AdditionalLCSCapabilitySets": {
              "release98_99": true,
              "release4": true,
              "release5": true,
              "release6": true,
              "release7": false
            }
          },
          "vGmlcAddress": "90.3.120.5",
          "hGmlcAddress": "10.0.0.14",
          "addVGmlcAddress": "5a00:0:2:4104:0:3:2a05:785b"
        }
      }

    ## MAP PSL Response ##
    MAP_PSL_Response:
      type: object
      properties:
        network:
          type: string
          description: Only value for MAP SRILCS/PSL is `GSM/UMTS` (informative only).
          example: GSM/UMTS
        protocol:
          type: string
          description: Only value for MAP SRILCS/PSL is `MAP` (informative only).
          example: MAP
        operation:
          type: string
          description: Only value for MAP SRILCS/PSL is `SRILCS-PSL` (informative only).
          example: SRILCS-PSL
        clientReferenceNumber:
          type: integer
          format: int32
          description: Reference number with significance only for the GMLC Client that triggered the location report.
        lcsReferenceNumber:
          type: integer
          format: int32
          description: If present, it shall contain the reference number identifying the deferred location request. Significantly important for deferred EPC-MT-LR procedures, when the report (within MAP SLR) can arrive hours or even days after the initial MAP PSL response or Diameter SLg PLA.
        SRILCS:
          $ref: '#/components/schemas/MAP_SRILCS_Response'
        PSL:
          type: object
          properties:
            LocationEstimate:
              $ref: '#/components/schemas/LocationEstimateLg'
            ageOfLocationEstimate:
              type: integer
              format: int32
              description: Indication in minutes of how old the location estimate is.
            AdditionalLocationEstimate:
              $ref: '#/components/schemas/AdditionalLocationEstimate'
            DeferredMTLRResponseIndicator:
              type: boolean
              description: indication if the message is sent in response to the deferred Mobile Terminated Location Request (MT-LR).
            GeranPositioningData:
              $ref: '#/components/schemas/GeranPositioningData'
            UtranPositioningData:
              $ref: '#/components/schemas/UtranPositioningData'
            CGI:
              $ref: '#/components/schemas/CGI'
            accuracyFulfilmentIndicator:
              type: string
              description: Indication if the requested accuracy was fulfilled or not.
              enum:
                - REQUESTED_ACCURACY_FULFILLED
                - REQUESTED_ACCURACY_NOT_FULFILLED
            VelocityEstimate:
              $ref: '#/components/schemas/VelocityEstimate'
            moLrShortCircuitIndicator:
              type: boolean
              description: indicates that the Mobile Originate Location Request (MO-LR) Short Circuit feature is accepted by the MS/UE, used to provide a location estimate directly from the UE to the serving SGSN or MSC using a Mobile-Based positioning method (e.g. GPS) according to the requested LCS-QoS and that is not obtained or verified by the RAN.
            GeranGANSSPositioningData:
              $ref: '#/components/schemas/GeranGANSSPositioningData'
            UtranGANSSPositioningData:
              $ref: '#/components/schemas/UtranGANSSPositioningData'
            TargetServingNodeForHandover:
              $ref: '#/components/schemas/TargetServingNodeForHandover'
            UtranAdditionalPositioningData:
              $ref: '#/components/schemas/UtranAdditionalPositioningData'
            BarometricPressure:
              $ref: '#/components/schemas/BarometricPressure'
            CivicAddress:
              $ref: '#/components/schemas/CivicAddress'

    ## MAP SLR Request ##
    MAP_SLR_Request:
      description: |
        SS7 MAP Subscriber Location Report (SLR) request.
        <br />
        Used to retrieve the location of a target User Equipment from the MSC or SGSN when a request for location is either implicitly administered or made at some earlier time in MAP PSL for event-based deferred type of location.
      properties:
        network:
          type: string
          description: Only accepted value for **Diameter SLR** is `GSM/UMTS`.
          enum: [ LTE ]
        protocol:
          type: string
          enum: [ Diameter SLh-SLg(ELP) ]
        operation:
          type: string
          enum: [ SLR ]
        result:
          type: string
          enum:
            - SUCCESS
            - ERROR
        clientReferenceNumber:
          type: integer
          format: int64
          description: reference number with significance only for the GMLC Client that triggered the location report.
        lcsEvent:
          type: string
          description: the event that triggered the Subscriber Location Report.
          enum: [ EMERGENCY_CALL_ORIGINATION, EMERGENCY_CALL_RELEASE, MO_LR, DEFERRED_MT_LR_RESPONSE, DEFERRED_MO_LR_TTTP_INITIATION , EMERGENCY_CALL_HANDOVER ]
        LCSClientID:
          type: object
          description: contains the name of the LCS client where the result of the positioning operation should be sent.
          properties:
            lcsClientType:
              type: integer
              minimum: 0
              maximum: 3
              description: |
                type of positioning request issues by the LCS Client.
                - 0 (emergency services)
                - 1 (value-added services)
                - 2 (PLMN operator services)
                - 3 (lawful interception)
            lcsClientInternalID:
              type: integer
              format: int32
              description: internal identity of the LCS client issuing the positioning request.
            lcsClientIDName:
              type: object
              properties:
                lcsClientName:
                  type: string
                  description: name of the LCS client issuing the positioning request.
                lcsClientDataCodingScheme:
                  type: integer
                  minimum: 0
                  maximum: 4
                  description: |
                    data coding scheme (information of the alphabet and the language used) of the LCS client issuing the positioning request.
                    - 0 (LOGICAL_NAME)
                    - 1 (EMAIL_ADDRESS)
                    - 2 (MSISDN)
                    - 3 (URL) 
                    - 4 (SIP_URL)
                lcsClientDataFormatIndicator:
                  type: integer
                  minimum: 0
                  maximum: 4
                  description: |
                    format indicator of the LCS client issuing the positioning request.
                    - 0 (LOGICAL_NAME)
                    - 1 (EMAIL_ADDRESS)
                    - 2 (MSISDN)
                    - 3 (URL) 
                    - 4 (SIP_URL)
            lcsClientAPN:
              type: string
              description: Access Point Name (APN) Network Identifier of the LCS client issuing the positioning request.
            lcsClientRequestorID:
              type: object
              properties:
                requestorIDEncodedString:
                  type: string
                  description: requestor identity in UTF8 string format of the LCS requestor issuing the positioning request.
                requestorIDDataCodingScheme:
                  type: integer
                  minimum: 0
                  maximum: 4
                  description: |
                    requestor identity data coding scheme (information of the alphabet and the language used) of the LCS requestor issuing the positioning request.
                    - 0 (LOGICAL_NAME)
                    - 1 (EMAIL_ADDRESS)
                    - 2 (MSISDN)
                    - 3 (URL) 
                    - 4 (SIP_URL)
                requestorIDFormatIndicator:
                  type: integer
                  format: int32
                  description: requestor identity format indicator of the LCS requestor issuing the positioning request.
            lcsClientDialedByMS:
              type: integer
              format: int32
              description: identity of the LCS client issuing the positioning request, dialed by the MS.
        LCSLocationInfo:
          $ref: '#/components/schemas/LCSLocationInfo'
        msisdn:
          type: integer
          format: int64
          description: ITU-T E.164 digits of the subscriber’s MS/UE that generated the location report.
        imsi:
          type: integer
          format: int64
          description: ITU-T E.212 digits of the subscriber’s MS/UE that generated the location report.
        imei:
          type: string
          description: International Mobile Equipment Identity (IMEI) of the subscriber’s MS/UE that’s generated the location report.
        naESRD:
          type: integer
          format: int64
          description: if present, refers to `North American Emergency Services Routing Digits` (it only applies to location for emergency services calls in North America).
        naESRK:
          type: integer
          format: int64
          description: if present, refers to `North American Emergency Services Routing Key` (it only applies to location for emergency services calls in North America).
        LocationEstimate:
          $ref: '#/components/schemas/LocationEstimateLg'
        ageOfLocationEstimate:
          type: integer
          format: int32
          description: indication in minutes of how old is the location estimate.
        SLRArgExtensionContainer:
          type: object
          description: indicate that it requires the GMLC to allocate a NA-ESRK based on the target MS location estimate (only applies to emergency services calls in North America).
          properties:
            naESRKRequest:
              type: boolean
          example: {
            "SLRArgExtensionContainer": {
              "naESRKRequest": true
            }
          }
        AdditionalLocationEstimate:
          $ref: '#/components/schemas/AdditionalLocationEstimate'
        DeferredMTLRData:
          $ref: '#/components/schemas/DeferredMTLRDataMAP'
        lcsReferenceNumber:
          type: integer
          format: int64
          description: if present, it shall contain the reference number identifying the deferred location request. Significantly important for deferred EPC-MT-LR procedures, when MAP SLR or Diameter SLg LRR can arrive hours or even days after the initial MAP PSL response or Diameter SLg PLA.
        GeranPositioningData:
          $ref: '#/components/schemas/GeranPositioningData'
        UtranPositioningData:
          $ref: '#/components/schemas/UtranPositioningData'
        LAI:
          $ref: '#/components/schemas/LAI'
        CGI:
          $ref: '#/components/schemas/CGI'
        SAI:
          $ref: '#/components/schemas/SAI'
        hGmlcAddress:
          type: string
          description: if present, it contains the GMLC IP address residing at the home network (H-PLMN).
        lcsServiceTypeID:
          type: integer
          minimum: 0
          maximum: 127
          description: |
            if present, it consists of an integer value lower than 128, which refers to the following: emergency services (0), emergency alert services (1), person tracking (2), fleet management (3), asset management (4), traffic congestion reporting (5), roadside assistance (6), routing to nearest commercial enterprise (7), navigation (8), city sightseeing (9), localized advertising (10), mobile yellow pages (11), traffic and public transportation info (12), weather (13), asset and service finding (14), gaming (15), find your friend (16), dating (17), chatting (18), route finding (19), where am I (20).
        pseudonymIndicator:
          type: string
          description: If present, refers to the request of a pseudonym to the GMLC.
          enum:
            - PSEUDONYM_REQUESTED
            - PSEUDONYM_NOT_REQUESTED
        accuracyFulfilmentIndicator:
          type: string
          description: indication if the requested accuracy was fulfilled or not.
          enum: [ REQUESTED_ACCURACY_FULFILLED, REQUESTED_ACCURACY_NOT_FULFILLED ]
        VelocityEstimate:
          $ref: '#/components/schemas/VelocityEstimate'
        sequenceNumber:
          type: integer
          format: int32
          description: if present, refers to the **number of the periodic location reports completed**. The sequence number would be set to 1 in the first location report and increment by 1 for each new report. When the number reaches the reporting amount value, the H-GMLC (for a periodic MT-LR or a periodic MO-LR transfer to third party) will know the procedure is complete.
        PeriodicLDRInfo:
          $ref: '#/components/schemas/PeriodicLDRInfo'
        moLrShortCircuitIndicator:
          type: boolean
          description: indicates that the Mobile Originate Location Request (MO-LR) Short Circuit feature is accepted by the MS/UE, used to provide a location estimate directly from the UE to the serving SGSN or MSC using a Mobile-Based positioning method (e.g. GPS) according to the requested LCS-QoS and that is not obtained or verified by the RAN.
        GeranGANSSPositioningData:
          $ref: '#/components/schemas/GeranGANSSPositioningData'
        UtranGANSSPositioningData:
          $ref: '#/components/schemas/UtranGANSSPositioningData'
        TargetServingNodeForHandover:
          $ref: '#/components/schemas/TargetServingNodeForHandover'
        UtranAdditionalPositioningData:
          $ref: '#/components/schemas/UtranAdditionalPositioningData'
        BarometricPressure:
          $ref: '#/components/schemas/BarometricPressure'
        CivicAddress:
          $ref: '#/components/schemas/CivicAddress'

    ## Diameter SLh-SLg Request ##
    Diameter_SLg_PLR:
      description: |
        Diameter SLh Routing-Information-Request (RIR) / Diameter SLg Provide-Location-Request (PLR)
        <br />
        Request subscriber's location information from the MME, SGSN or combined MME/SGSN via a Diameter SLg Provide-Location-Request after a previous Diameter SLh Routing-Information-Request in a 4GLTE Evolved-Packet-Core (EPC) network.
      required:
        - token
        - lcsLocationType
        - lcsClientName
        - lcsClientType
        - lcsClientFormatIndicator
        - clientReferenceNumber
      oneOf:
        - type: object
          required: [ msisdn ]
          properties:
            msisdn:
              type: integer
              format: int64
              description: ITU-T E.164 digits of the target subscriber. Required if **imsi** is *absent*.
        - type: object
          required: [ imsi ]
          properties:
            imsi:
              type: integer
              format: int64
              description: ITU-T E.212 digits (IMSI) of the target subscriber. Required if **msisdn** is *absent*.
      properties:
        token:
          type: string
          description: Authentication token. Must match **curltoken** on *GmlcManagement_gmlcproperties.xml* file or the **token** in the MongoDB database within the *curl-account* collection.
          example: lksdijxklisdfdfd
        clientReferenceNumber:
          type: integer
          format: int64
          description: Correlation reference number between a request and a response of a deferred Mobile Terminating Location Request procedure (MT-LR) sent by the GMLC to the core network destination entity (MME or SGSN).
        lcsLocationType:
          type: integer
          minimum: 0
          maximum: 5
          description: |
            Type of location request.
            <br />
            - 0 (current location) 
            - 1 (current or last known location)
            - 2 (initial location)
            - 3 (active deferred location)
            - 4 (cancel deferred location)
            - 5 (notification verification only)
        lcsDeferredLocationType:
          type: integer
          minimum: 0
          maximum: 7
          description: |
            Type of event, until when the location estimation is deferred.
            <br />
            - 0 (UE-Available) 
            - 1 (Entering-Into-Area)
            - 2 (Leaving-From-Area)
            - 3 (Being-Inside-Area)
            - 4 (Periodic-LDR)
            - 5 (Motion-Event)
            - 6 (LDR-Activated)
            - 7 (Maximum-Interval-Expiration)
        lcsClientName:
          type: string
          description: LCS client name, an UTF8 string consistent with its format indicator.
        lcsClientFormatIndicator:
          type: integer
          minimum: 0
          maximum: 4
          description: |
            Client name format.
            <br />
            - 0 (logical name) 
            - 1 (email address)
            - 2 (MSISDN)
            - 3 (URL)
            - 4 (SIP URL)
        lcsClientType:
          type: integer
          minimum: 0
          maximum: 3
          description: |
            Type of location service being conducted by the PLR command.
            <br />
            - 0 (emergency services)
            - 1 (value-added services)
            - 2 (PLMN operator services)
            - 3 (lawful interception services)
        lcsClientInternalID:
          type: integer
          format: int32
          description: Internal client identifier.
        lcsClientExternalID:
          type: integer
          format: int32
          description: External client identifier.
        lcsQoSClass:
          type: integer
          minimum: 0
          maximum: 1
          description: |
            Quality treatment requested
            <br />
            - 0 (assured)
            - 1 (best effort)
        horizontalAccuracy:
          type: integer
          format: int32
          description: Requested horizontal accuracy (meters). The horizontal location error should be less than the error indicated by the uncertainty code with 67% confidence.
        verticalAccuracy:
          type: integer
          format: int32
          description: Requested vertical accuracy (meters). The vertical location error should be less than the error indicated by the uncertainty code with 67% confidence.
        verticalCoordinateRequest:
          type: integer
          minimum: 0
          maximum: 1
          description: |
            Indicates if vertical coordinate is requested
            <br />
            - 0 (not requested)
            - 1 (requested)
        responseTime:
          type: integer
          minimum: 0
          maximum: 1
          description: |
            Request urgency.
            <br />
            - 0 (low delay)
            - 1 (delay tolerant)
        lcsRequestorId:
          type: string
          description: Requestor identification, a UTF-8 string consistent with its format indicator.
        lcsRequestorFormatIndicator:
          type: integer
          minimum: 0
          maximum: 4
          description: |
            LCS Requestor ID format.
            <br />
            - 0 (logical name) 
            - 1 (email address)
            - 2 (MSISDN)
            - 3 (URL)
            - 4 (SIP URL)
        lcsPriority:
          type: integer
          format: int32
          minimum: 0
          description: |
            Priority treatment requested.
            <br />
            - 0 (highest priority)
            - >=1 (normal priority)
        lcsServiceTypeId:
          type: integer
          minimum: 0
          maximum: 127
          description: Location service type ID
        velocityRequested:
          type: integer
          minimum: 0
          maximum: 1
          description: |
            Velocity information requested or not.
            <br />
            - 0 (velocity not requested) 
            - 1 (velocity requested)
        lcsSupportedGADShapes:
          type: integer
          minimum: 0
          maximum: 6
          description: |
            Supported GAD shapes as per 3GPP TS 23.032.
            <br />
            - 0 (ellipsoidPoint)
            - 1 (ellipsoidPointWithUncertaintyCircle)
            - 2 (ellipsoidPointWithUncertaintyEllipse)
            - 3 (polygon)
            - 4 (ellipsoidPointWithAltitude)
            - 5 (ellipsoidPointWithAltitudeAndUncertaintyEllipsoid)
            - 6 (ellipsoidArc)
        lcsVisitedPLMNId:
          type: string
          description: Visited PLMN ID. Must contain the corresponding `MCC` and `MNC` parameters separated by a hyphen.
          example: 748-1
        lcsPeriodicLocationSupportIndicator:
          type: integer
          minimum: 0
          maximum: 1
          description: |
            Indicates if the PLMN-ID supports periodic location or not.
            <br />
            - 0 (not supported)
            - 1 (supported)
        lcsPrioritizedListIndicator:
          type: integer
          minimum: 0
          maximum: 1
          description: |
            Indicates if the PLMN-ID-List is provided in prioritized order or not.
            <br />
            - 0 (not prioritized)
            - 1 (prioritized)
        lcsCodeword:
          type: string
          description: Indicates the potential codeword string to send in a notification message to the UE.
        lcsPrivacyCheckNonSession:
          type: integer
          minimum: 0
          maximum: 3
          description: |
            Indication of how the positioning operation should proceed in the relation to the checking of the non-session-related privacy settings of the user.
            <br />
            - 0 (allowed without notification) 
            - 1 (allowed with notification)
            - 2 (allowed if no response)
            - 3 (restricted if no response)
        lcsPrivacyCheckSession:
          type: integer
          minimum: 0
          maximum: 3
          description: |
            Indication of how the positioning operation should proceed in the relation to the checking of the session-related privacy settings of the user.
            <br />
            - 0 (allowed without notification) 
            - 1 (allowed with notification)
            - 2 (allowed if no response)
            - 3 (restricted if no response)
        lcsApn:
          type: string
          description: Access Point Name (APN) Network Identifier of the LCS client, as used by the target UE. Included only for session-related location requests.
        imei:
          type: string
          description: |
            Target subscriber's International Mobile Equipment Identity (IMEI), per 3GPP TS 23.003.
            `14`–`15` **digits**
        lcsAreaType:
          type: integer
          minimum: 1
          maximum: 7
          description: |
            Geofence event area type.
            <br />
            - 1 (PLMN ID)
            - 2 (Location Area ID)
            - 3 (Routing Area ID)
            - 4 (Cell Global ID)
            - 5 (UTRAN Cell ID)
            - 6 (Tracking Area ID)
            - 7 (E-UTRAN Cell Global ID)
        lcsAreaId:
          type: string
          description: |
            Identity of the indicated area type.
            <br />
            Must contain the area identity parameters used for geofencing location reports, separated by a hyphen. 
            Eg., for the area type 7 (E-UTRAN Cell Global ID), a valid value would be `502-18-811059-103` for `MCC=502`, `MNC=19`, `eNBId=811059` and `CI=103`, or `502-18-207631207` for `MCC=502`, `MNC=19`, `ECI=207631207`.
        lcsAreaEventOccurrenceInfo:
          type: integer
          minimum: 0
          maximum: 1
          description: |
            Area event occurrence.
            <br />
            - 0 (one time event) 
            - 1 (multiple time event)
        lcsAreaEventIntervalTime:
          type: integer
          minimum: 1
          maximum: 32767
          description: Min interval between area event reports in seconds.
        lcsAreaEventMaxInterval:
          type: integer
          minimum: 1
          maximum: 86400
          description: Max interval between area event reports in seconds. Only applicable to a deferred EPC-MT-LR.
        lcsAreaEventSamplingInterval:
          type: integer
          minimum: 1
          maximum: 3600
          description: Max interval between consecutive evaluations by a UE of an area event (in seconds). Only applicable to a deferred EPC-MT-LR.
        lcsAreaEventReportingDuration:
          type: integer
          minimum: 1
          maximum: 8640000
          description: Max duration of event reporting (in seconds). Only applicable to a deferred EPC-MT-LR.
        lcsAreaEventReportLocationReqs:
          type: integer
          minimum: 0
          maximum: 31
          description: Location provisioning requirements for a deferred EPC-MT-LR.
        lcsAdditionalAreaType:
          type: integer
          minimum: 1
          maximum: 7
          description: |
            Additional geofence area type.
            <br />
            - 1 (PLMN ID)
            - 2 (Location Area ID)
            - 3 (Routing Area ID)
            - 4 (Cell Global ID)
            - 5 (UTRAN Cell ID)
            - 6 (Tracking Area ID)
            - 7 (E-UTRAN Cell Global ID)
        lcsAdditionalAreaId:
          type: string
          description: |
            Additional area ID.
            <br />
            Must contain the area identity parameters used for geofencing location reports, separated by a hyphen. 
            Eg., for the **area type** `7` (E-UTRAN Cell Global ID), a valid value would be `502-18-811059-103` for `MCC=502`, `MNC=19`, `eNBId=811059` and `CI=103`, or `502-18-207631207` for `MCC=502`, `MNC=19`, `ECI=207631207`.
          example: 502-18-207631207
        lcsMotionEventLinearDistance:
          type: integer
          minimum: 1
          maximum: 10000
          description: Minimum linear (straight line) distance for motion event reports (in meters). Only applicable to a deferred EPC-MT-LR.
        lcsMotionEventOccurrenceInfo:
          type: integer
          minimum: 0
          maximum: 1
          description: |
            Amount of motion events to be reported.
            <br />
            - 0 (one time event) 
            - 1 (multiple time events)
        lcsMotionEventIntervalTime:
          type: integer
          minimum: 1
          maximum: 32767
          description: Minimum time interval between motion event reports (in seconds).
        lcsMotionEventMaxInterval:
          type: integer
          minimum: 1
          maximum: 86400
          description: Maximum time interval between motion event reports (in seconds).
        lcsMotionEventSamplingInterval:
          type: integer
          minimum: 1
          maximum: 3600
          description: Maximum time interval between consecutive evaluations by a UE of a motion event (in seconds). **Only applicable** to a `deferred EPC-MT-LR`.
        lcsMotionEventReportingDuration:
          type: integer
          minimum: 1
          maximum: 8640000
          description: Maximum duration of motion event reporting (in seconds). **Only applicable** to a `deferred EPC-MT-LR`.
        lcsMotionEventReportLocationReqs:
          type: integer
          minimum: 0
          maximum: 31
          description: Requirements on location provision for a deferred EPC-MT-LR.
        lcsPeriodicReportingAmount:
          type: integer
          minimum: 1
          maximum: 8639999
          description: Reporting frequency (in seconds).
        lcsPeriodicReportingInterval:
          type: integer
          minimum: 1
          maximum: 8639999
          description: reporting interval (in seconds).
        lcsCallbackUrl:
          type: string
          description: URL to send the Subscriber Location Report. If absent, it defaults to the value set in the correspondent configuration file.
        hssDiameterHost:
          type: string
          description: Diameter host name to set in the Destination-Host AVP of the SLh Routing-Info-Request or the Sh User-Data-Request commands. If absent, the default parameter set in the `diameterdesthost` value of the `GmlcManagement_gmlcproperties.xml` file shall be used.
        hssDiameterRealm:
          type: string
          description: Diameter host realm to set in the Destination-Realm AVP of the SLh Routing-Info-Request or the Sh User-Data-Request commands. If absent, the default parameter set in the `diameterdestrealm` value of the `GmlcManagement_gmlcproperties.xml` file shall be used.

    ## Diameter SLh-SLg RIR/PLR Response ##
    Diameter_SLh_RIA_SLg_PLA:
      properties:
        network:
          type: string
          description: Only accepted value for **Diameter PLR** is `LTE`.
          enum: [ LTE ]
        protocol:
          type: string
          enum:
            - Diameter SLh-SLg(ELP)
            - Diameter SLg (ELg)
        operation:
          type: string
          enum:
            - RIR/RIA PLR/PLA
            - LRR
        result:
          type: string
          enum:
            - SUCCESS
            - ERROR
        clientReferenceNumber:
          type: integer
          format: int64
          description: A reference number with significance only for the GMLC client.
        imsi:
          type: integer
          format: int64
          description: ITU-T E.212 digits (IMSI) of the subscriber.
        msisdn:
          type: integer
          format: int64
          description: ITU-T E.164 digits of the subscriber.
        lmsi:
          type: string
          description: if present, it contains the `temporary identification` that is assigned to the target subscriber’s UE for security.
        lcsReferenceNumber:
          type: integer
          format: int32
          description: Correlation reference number between a request and a response of a deferred Mobile Terminating Location Request procedure (MT-LR) sent by the GMLC to the core network destination entity (MME or SGSN or combined MME/SGSN).
        plrFlags:
          type: integer
          minimum: 0
          maximum: 7
          description: |
            Indicates the Unsigned32 value of the PLR-Flags AVP, which contains a bit mask.
            <br />
            <br />
            When MO-LR-ShortCircuit-Indicator is set (`bit 0`), it indicates that the MO-LR short circuit feature is used by the UE for location estimate (applies only when for deferred MT-LR procedure and when the message is sent over Lgd interface).
            <br />
            <br />
            When Optimized-LCS-Proc-Req is set (`bit 1`), it indicates that optimized LCS procedure is requested for the combined MME/SGSN. Applicable only when the MT-LR procedure is initiated by the GMLC over the Lgd interface. 
            <br />
            <br />
            When Delayed-Location-Reporting-Support-Indicator is set (`bit 2`), it indicates that the GMLC supports delayed location reporting for UEs transiently not reachable (e.g. IoT devices in extended idle mode DRX or Power Saving Mode).
        Routing-Info-Answer:
          type: object
          properties:
            msisdn:
              type: integer
              format: int64
              description: ITU-T E.164 digits of the target subscriber. If absent, then the `imsi` must be present.
            imsi:
              type: integer
              format: int64
              description: ITU-T E.212 digits (IMSI) of the target subscriber. If absent, then the `msisdn` must be present.
            lmsi:
              type: integer
              format: int64
              description: if present, it contains the `temporary identification` that is assigned to the target subscriber’s UE for security.
            ServingNode:
              $ref: '#/components/schemas/ServingNode'
            AdditionalServingNode:
              $ref: '#/components/schemas/ServingNode'
            gmlcAddress:
              type: string
              description: if present, it contains the GMLC IP address.
              example: 191.32.101.7
            pprAddress:
              type: string
              description: if present, it contains the `Privacy Profile Register (PPR) IP address`.
            riaFlags:
              type: integer
              minimum: 0
              maximum: 1
              description: |
                the RIA-Flags AVP is of type Unsigned32 containing a bit mask, only for `bit 0`: "Combined-MME/SGSN-Supporting-Optimized-LCS-Proc". If set (`1`), it means that the UE is served by the MME and the SGSN parts of the same combined MME/SGSN and this combined MME/SGSN supports the optimized LCS procedure.
        Provide-Location-Answer:
          type: object
          properties:
            LocationEstimate:
              $ref: '#/components/schemas/LocationEstimateSLg'
            accuracyFulfilmentIndicator:
              type: string
              description: Indication if the requested accuracy was fulfilled or not.
              enum:
                - REQUESTED_ACCURACY_FULFILLED
                - REQUESTED_ACCURACY_NOT_FULFILLED
            ageOfLocationEstimate:
              type: integer
              format: int32
              description: Indication in minutes of how old the location estimate is.
            VelocityEstimate:
              $ref: '#/components/schemas/VelocityEstimate'
            EUtranPositioningData:
              type: object
              description: |
                if present, indicates the usage of each positioning method that was attempted to determine the location estimate within the E-UTRAN (represented as the retrieved hexadecimal value for now). 
                Similar structure as `UtranPositioningData` or `UtranGANSSPositionData`, however there are some differences in the possible values of the **method** and **ganssId** fields.
              oneOf:
                - $ref: '#/components/schemas/EUtranPositioningData'
                - $ref: '#/components/schemas/EUtranGNSSPositioningData'
                - $ref: '#/components/schemas/EUtranAdditionalPositioningData'
            ECGI:
              allOf:
                - $ref: '#/components/schemas/ECGI'
                - type: object
                  properties:
                    cellPortionId:
                      type: integer
                      format: int32
                      description: if present, it indicates the current Cell Portion location of the target UE as provided by the E-SMLC
            GeranPositioningData:
              $ref: '#/components/schemas/GeranPositioningData'
            CGI:
              $ref: '#/components/schemas/CGI'
            UtranPositioningData:
              $ref: '#/components/schemas/UtranPositioningData'
            SAI:
              $ref: '#/components/schemas/SAI'
            TargetServingNodeForHandover:
              $ref: '#/components/schemas/TargetServingNodeForHandover'
            plaFlags:
              type: integer
              minimum: 0
              maximum: 15
              description: |
                refers to the PLA-Flags AVP of type Unsigned32 containing a bit mask, as per table 7.4.53/1 of 3GPP TS 29.172.
                - ´bit 0´ Deferred-MT-LR-Response-Indicator, when set, indicates that the message is sent in response to the deferred-MT location request;
                - ´bit 1´ MO-LR-ShortCircuit-Indicator, when set, indicates that the MO-LR short circuit feature is accepted by the UE, for periodic location reporting (applicable only when the message is sent over Lgd interface);
                - ´bit 2´ Optimized-LCS-Proc-Performed, when set, indicates that the combined MME/SGSN has performed the optimized LCS procedure to retrieve the location of the target UE (applicable only when the message is sent for the MT-LR procedure over the Lgd interface);
                - ´bit 3´ UE-Transiently-Not-Reachable-Indicator, when set, indicates that the UE is transiently not reachable due to power saving (e.g. UE is in extended idle mode DRX or in Power Saving Mode), and that the location information will be returned in a subsequent Subscriber Location Report when the UE becomes reachable.
            ESMLCCellInfo:
              $ref: '#/components/schemas/ESMLCCellInfo'
            CivicAddress:
              $ref: '#/components/schemas/CivicAddress'
            BarometricPressure:
              $ref: '#/components/schemas/BarometricPressure'


    ## Diameter SLg LRR ##
    Diameter_SLg_LRR:
      description: |
        Diameter Location Report Request
        <br />
        Event-based triggered location report received at the GMLC from the MME or SGSN or combined MME/SGSN. Possible events triggering these reports are emergency call (origination, release, handover), handover to 5G core, mobile-originated, area or motion events or delayed deferred location reports armed via a previous Diameter SLg PLR.
      properties:
        network:
          type: string
          description: Only accepted value for **Diameter PLR** is `LTE`.
          enum: [ LTE ]
        protocol:
          type: string
          enum:
            - Diameter SLh-SLg(ELP)
            - Diameter SLg (ELg)
        operation:
          type: string
          enum:
            - RIR/RIA PLR/PLA
            - LRR
        result:
          type: string
          enum:
            - SUCCESS
            - ERROR
        clientReferenceNumber:
          type: integer
          format: int64
          description: Reference number with significance only for the GMLC Client that triggered the location report.
        locationEvent:
          type: string
          description: the event that triggered the Subscriber Location Report.
          enum: [ EMERGENCY_CALL_ORIGINATION, EMERGENCY_CALL_RELEASE, MO_LR, DEFERRED_MT_LR_RESPONSE, DEFERRED_MO_LR_TTTP_INITIATION , EMERGENCY_CALL_HANDOVER, DELAYED_LOCATION_REPORTING, HANDOVER_TO_5GC ]
        lcsEPSClientName:
          type: object
          description: contains the name of the LCS client where the result of the positioning operation should be sent.
          properties:
            lcsEPSClientNameString:
              type: string
              description: identity in UTF8 String format of the LCS client issuing the positioning request.
            lcsClientDataCodingScheme:
              type: integer
              format: int32
              description: data coding scheme (information of the alphabet and the language used) of the LCS client issuing the positioning request.
            lcsClientDataFormatIndicator:
              type: integer
              minimum: 0
              maximum: 4
              description: |
                format indicator of the LCS client issuing the positioning request.
                - 0 (LOGICAL_NAME)
                - 1 (EMAIL_ADDRESS)
                - 2 (MSISDN)
                - 3 (URL)
                - 4 (SIP_URL)
        imsi:
          type: integer
          format: int64
          description: ITU-T E.212 digits of the subscriber’s MS/UE that’s generated the location report.
        msisdn:
          type: integer
          format: int64
          description: ITU-T E.164 digits of the subscriber’s MS/UE that’s generated the location report.
        imei:
          type: string
          description: International Mobile Equipment Identity (IMEI) of the target subscriber as specified by 3GPP TS 23.003. It can contain only 14 to 15 digits.
        LocationEstimate:
          $ref: '#/components/schemas/LocationEstimateSLg'
        accuracyFulfilmentIndicator:
          type: string
          enum: [ REQUESTED_ACCURACY_FULFILLED, REQUESTED_ACCURACY_NOT_FULFILLED ]
        ageOfLocationEstimate:
          type: integer
          format: int32
          description: Indication in minutes of how old the location estimate is.
        VelocityEstimate:
          $ref: '#/components/schemas/VelocityEstimate'
        EUtranPositioningData:
          type: object
          description: |
            if present, indicates the usage of each positioning method that was attempted to determine the location estimate within the E-UTRAN (represented as the retrieved hexadecimal value for now). 
            Similar structure as `UtranPositioningData` or `UtranGANSSPositionData`, however there are some differences in the possible values of the **method** and **ganssId** fields.
          oneOf:
            - $ref: '#/components/schemas/EUtranPositioningData'
            - $ref: '#/components/schemas/EUtranGNSSPositioningData'
            - $ref: '#/components/schemas/EUtranAdditionalPositioningData'
        ECGI:
          allOf:
            - $ref: '#/components/schemas/ECGI'
            - type: object
              properties:
                cellPortionId:
                  type: integer
                  format: int32
                  description: if present, it indicates the current Cell Portion location of the target UE as provided by the E-SMLC
        GeranPositioningData:
          oneOf:
            - $ref: '#/components/schemas/GeranPositioningData'
            - $ref: '#/components/schemas/GeranGANSSPositioningData'
        CGI:
          $ref: '#/components/schemas/CGI'
        UtranPositioningData:
          oneOf:
            - $ref: '#/components/schemas/UtranPositioningData'
            - $ref: '#/components/schemas/UtranGANSSPositioningData'
            - $ref: '#/components/schemas/UtranAdditionalPositioningData'
        SAI:
          $ref: '#/components/schemas/SAI'
        lcsServiceTypeID:
          type: integer
          minimum: 0
          maximum: 127
          description: |
            It is an integer value lower than 128, which refer to the following: emergency services (0), emergency alert services (1), person tracking (2), fleet management (3), asset management (4), traffic congestion reporting (5), roadside assistance (6), routing to nearest commercial enterprise (7), navigation (8), city sightseeing (9), localized advertising (10), mobile yellow pages (11), traffic and public transportation info (12), weather (13), asset and service finding (14), gaming (15), find your friend (16), dating (17), chatting (18), route finding (19), where am I (20)
        pseudonymIndicator:
          type: string
          description: If present, refers to the request of a pseudonym to the GMLC.
          enum:
            - PSEUDONYM_REQUESTED
            - PSEUDONYM_NOT_REQUESTED
        lcsQoSClass:
          type: string
          enum: [ ASSURED, BEST_EFFORT ]
          description: LCS quality of service.
        TargetServingNodeForHandover:
          $ref: '#/components/schemas/TargetServingNodeForHandover'
        lrrFlags:
          type: integer
          minimum: 0
          maximum: 7
          description: |
            Indicates the Unsigned32 value of the LRR-Flags AVP, which contains a bit mask. 
            <br />
            <br />
            When Lgd/SLg-Indicator is set (`bit 0`), it indicates that the LRR source node is an SGSN or a combined MME/SGSN to which the UE is attached via UTRAN or GERAN).
            <br />
            <br />
            When MO-LR-ShortCircuit-Indicator is set (`bit 1`), it indicates that the MO-LR short circuit feature is used by the UE for location estimate (applies only when for deferred MT-LR procedure and when the message is sent over Lgd interface).
            <br />
            <br />
            When `bit 2` is set, it indicates that the UE is requesting to use MO-LR short circuit feature for location estimate (applies only when periodic MO-LR TTTP procedure is initiated by the UE and when the message is sent over Lgd interface).
        lcsReferenceNumber:
          type: integer
          format: int64
          description: if present, it shall contain the reference number identifying the deferred location request. Significantly important for deferred EPC-MT-LR procedures, when Diameter SLg LRR can arrive hours or even days after the initial Diameter SLg PLA.
        DeferredMTLRData:
          $ref: '#/components/schemas/DeferredMTLRDataSLg'
        gmlcAddress:
          type: string
          description: if present, it contains the GMLC IP address.
          example: 191.32.101.7
        PeriodicLDRInfo:
          $ref: '#/components/schemas/PeriodicLDRInfo'
        ESMLCCellInfo:
          $ref: '#/components/schemas/ESMLCCellInfo'
        DelayedLocationReportingData:
          $ref: '#/components/schemas/DelayedLocationReportingData'
        CivicAddress:
          $ref: '#/components/schemas/CivicAddress'
        BarometricPressure:
          $ref: '#/components/schemas/BarometricPressure'
        amfInstanceId:
          type: string
          description: |
            If present, it identifies the Access and Mobility Management Function (AMF) ID for LCS Handover to 5GC. It corresponds to the AMF-Instance-Id AVP, which is of type UTF8String and shall be coded as the NfInstanceId according to clause 5.3.2-1, in 3GPP TS 29.571, i.e., a string uniquely identifying a NF instance. The format of the NF Instance ID shall be a Universally Unique Identifier (UUID) version 4, as described in IETF RFC 4122. The String identifying the AMF ID is composed of AMF Region ID (8 bits), AMF Set ID (10 bits) and AMF Pointer (6 bits) as specified in clause 2.10.1 of 3GPP TS 23.003, i.e., <AMF Identifier> = <AMF Region ID><AMF Set ID><AMF Pointer>. It is encoded as a string of 6 hexadecimal characters (i.e., 24 bits). AMF Region ID pattern: '^[A-Fa-f0-9]{6}$', AMF Set ID and AMF Pointer patterns: '^[A-Fa-f0-9]{2}$'.


    ## Diameter Sh UDR ##
    Diameter_Sh_UDR:
      description: |
        Diameter Sh User-Data-Request
        <br />
        Request subscriber's information from the Home Subscriber Server (HSS) over the **Sh** reference point.
      required:
        - token
        - msisdn
      properties:
        token:
          type: string
          description: Authentication token. Must match **curltoken** on *GmlcManagement_gmlcproperties.xml* file or the **token** in the MongoDB database within the *curl-account* collection.
          example: lksdijxklisdfdfd
        msisdn:
          type: integer
          format: int64
          description: ITU-T E.164 digits of the target subscriber.
        domain:
          type: string
          description: |
            Core network domain to which the Diameter operation is conveyed.
            - cs -> Circuit-Switched
            - ps -> Packet-Switched
          enum:
            - cs
            - ps
          default: ps
        activeLocation:
          type: boolean
          description: Used to indicate if an active location retrieval needs to be performed or not.
          default: true
        locationInfoEps:
          type: boolean
          description: |
            Used to indicate if EPS Location Information may be sent or not to the GMLC.
            If set to `false`, EPS Location Information will not be retrieved.
          default: true
        locationInfo5gs:
          type: boolean
          description: Used to indicate if 5GS Location Information may be sent or not to the GMLC.
          default: true
        ratTypeRequested:
          type: boolean
          description: Used to indicate if the Radio Access type is requested.
          default: false
        hssDiameterHost:
          type: string
          description: |
            Diameter host name to set in the Destination-Host AVP of the SLh Routing-Info-Request or the Sh User-Data-Request commands.
            If absent, the default parameter set in the `diameterdesthost` value of the **GmlcManagement_gmlcproperties.xml** file shall be used.
        hssDiameterRealm:
          type: string
          description: |
            Diameter host realm to set in the Destination-Realm AVP of the SLh Routing-Info-Request or the Sh User-Data-Request commands.
            If absent, the default parameter set in the `diameterdestrealm` value of the **GmlcManagement_gmlcproperties.xml** file shall be used.

    ## Diameter Sh UDR Response ##
    Diameter_Sh_UDA:
      type: object
      properties:
        network:
          type: string
          description: Only accepted value for **Diameter UDR** is `IMS`.
          enum: [ IMS ]
        protocol:
          type: string
          enum:
            - Diameter Sh
        operation:
          type: string
          enum:
            - UDR-UDA
        result:
          type: string
          enum:
            - SUCCESS
            - ERROR
        PublicIdentifiers:
          type: object
          example: {
            "PublicIdentifiers": {
              "msisdn": 573017706052
            }
          }
        CSLocationInformation:
          $ref: '#/components/schemas/CSLocationInformation'
        PSLocationInformation:
          $ref: '#/components/schemas/PSLocationInformation'
        EPSLocationInformation:
          $ref: '#/components/schemas/EPSLocationInformation'
        5GSLocationInformation:
          $ref: '#/components/schemas/5GSLocationInformation'


    ###########################
    # SHARED RESPONSE OBJECTS #
    ###########################
    MAP_ATI_PSI_Response_shared_params:
      type: object
      properties:
        CSLocationInformation:
          $ref: '#/components/schemas/CSLocationInformation'
        PSLocationInformation:
          $ref: '#/components/schemas/PSLocationInformation'
        EPSLocationInformation:
          $ref: '#/components/schemas/EPSLocationInformation'
        5GSLocationInformation:
          $ref: '#/components/schemas/5GSLocationInformation'
        PublicIdentifiers:
          type: object
          example: {
            "PublicIdentifiers": {
              "msisdn": 573017706052
            }
          }
        subscriberState:
          type: string
          description: |
            if present, it contains the current state of the target subscriber. 
            If currently within the CS domain, possible values are `assumedIdle`, `camelBusy`, `netDetNotReachable` or `notProvidedFromVLR`. 
            If currently within the PS domain, possible values are `notProvidedFromSGSNorMME`, `ps-Detached`, `ps-AttachedNotReachableForPaging`, `ps-AttachedReachableForPaging`, `ps-PDP-ActiveNotReachableForPaging` , `ps-PDP-ActiveReachableForPaging`  or `netDetNotReachable`.
          enum:
            # Within CS Domain
            - assumedIdle
            - camelBusy
            - notProvidedFromVLR
            # Within the PS domain
            - notProvidedFromSGSNorMME
            - ps-Detached
            - ps-AttachedNotReachableForPaging
            - ps-AttachedReachableForPaging
            - ps-PDP-ActiveNotReachableForPaging
            - ps-PDP-ActiveReachableForPaging
            # Within either CS/PS domain
            - netDetNotReachable
        notReachableReason:
          type: string
          description: If present, it contains the reason why the target subscriber is currently not reachable, provided by the network node.
          enum:
            - msPurged
            - imsiDetached
            - restrictedArea
            - notRegistered
        MNPInfoResult:
          $ref: '#/components/schemas/MNPInfoResult'
        msClassmark:
          type: string
          description: If present, it contains the Mobile Station Classmark 2 of the target subscriber (only hexadecimal bytes values are shown for now, coded as shown in figure 10.5.6 of ETSI TS 24.008, table 10.5.6a of ETSI TS 24.008 and table 10.5.6b of ETSI TS 24.008).
        #GPRSMSClass:
          #          type: object
          #          description: If present, defines the GPRS (General Packet Radio Service) Mobile Station (MS) capabilities of a mobile subscriber.
          #          properties:
          #            msNetworkCapability:
          #              type: string
          #              description: MS network capabilities (e.g. SMS).
          #            msRadioAccessCapability:
          #              type: string
          #              description: MS radio access capabilities (e.g. radio access technologies support).
        LastUEActivityTime:
          type: object
          description: If present, corresponds to the last activity time of the target subscriber’s `user equipment (UE)`.
          properties:
            year:
              type: integer
              format: int32
              description: Year of last activity time of the target subscriber’s UE.
              minimum: 1000
              maximum: 9999
            month:
              type: integer
              minimum: 1
              maximum: 12
              description: Month of the last activity time of the target subscriber’s UE.
            day:
              type: integer
              minimum: 1
              maximum: 31
              description: Day of the last activity time of the target subscriber’s UE.
            hour:
              type: integer
              minimum: 0
              maximum: 23
              description: Hour of the last activity time of the target subscriber’s UE.
            minute:
              type: integer
              minimum: 0
              maximum: 59
              description: Minute of the last activity time of the target subscriber’s UE.
            second:
              type: integer
              minimum: 0
              maximum: 59
              description: Second of the last activity time of the target subscriber’s UE.
        LastRATType:
          type: string
          description: If present, it contains the last `Radio Access Technology (RAT)` type used by the target subscriber.
          enum:
            - utran
            - geran
            - gan
            - iHspaEvolution
            - eUtran
            - nbIoT

    ######################
    ### REUSED OBJECTS ###
    ######################
    LocationNumber:
      type: object
      properties:
        oddFlag:
          type: boolean
          description: possible values are `true` (odd) or `false` (even).
          example: false
        natureOfAddressIndicator:
          type: integer
          format: int32
          description: possible values are `0` (spare), `1` (reserved for subscriber number -national use-), `2` (reserved for unknown -national use-), `3` (national significant number -national use-), `4` (international number), `5-111` (spare), `112-126` (reserved for national use), `127` (spare).
          example: 4
        internalNetworkNumberIndicator:
          type: integer
          format: int32
          description: possible values are `0` (false - routing to internal number allowed), `1` (true - routing to internal number not allowed).
          example: 1
        numberingPlanIndicator:
          type: integer
          format: int32
          description: possible values are `0` (spare), `1` (ISDN (telephony) numbering plan as per ITU-T Recommendation E.164), `2` (spare), `3` (Data numbering plan as per ITU-T Recommendation X.121), `4` (Telex numbering plan as per ITU-T Recommendation F.69 -national use-), `5` (private numbering plan), `6` (reserved for national use), `7` (spare).
          example: 1
        addressPresentationRestrictedIndicator:
          type: integer
          format: int32
          description: possible values are `0` (presentation allowed), `1` (presentation restricted), `2` (address not available -national use-), `3` (spare).
          example: 3
        screeningIndicator:
          type: integer
          format: int32
          description: possible values are `0` (reserved), `1` (user provided, verified and passed), `2` (network), `3` (network provided).
        address:
          type: integer
          format: int64
          description: Location Number `address digits`.
          example: 819203961904
      example: {
        "LocationNumber": {
          "oddFlag": false,
          "natureOfAddressIndicator": 4,
          "internalNetworkNumberIndicator": 1,
          "numberingPlanIndicator": 1,
          "addressPresentationRestrictedIndicator": 1,
          "screeningIndicator": 3,
          "address": 819203961904
        }
      }

    CGI:
      type: object
      description: Cell Global Identification
      properties:
        mcc:
          type: integer
          format: int32
          description: Mobile Country Code (3 digits)
          minimum: 0
          maximum: 999
        mnc:
          type: integer
          format: int32
          description: Mobile Network Code (2 o 3 digits)
          minimum: 0
          maximum: 999
        lac:
          type: integer
          format: int32
          description: Location Area Code
        ci:
          type: integer
          format: int32
          description: Cell Identity.
      example: {
        "CGI": {
          "mcc": 748,
          "mnc": 1,
          "lac": 101,
          "ci": 10263
        }
      }

    SAI:
      type: object
      description: Service Area Identification
      properties:
        mcc:
          type: integer
          format: int32
          description: Mobile Country Code (3 digits)
        mnc:
          type: integer
          format: int32
          description: Mobile Network Code (2 o 3 digits)
        lac:
          type: integer
          format: int32
          description: Location Area Code
        sac:
          type: integer
          format: int32
          description: Service Area Code.
      example: {
        "SAI": {
          "mcc": 748,
          "mnc": 1,
          "lac": 119,
          "sac": 15336
        }
      }

    LAI:
      type: object
      description: Location Area Identification
      properties:
        mcc:
          type: integer
          format: int32
          description: Mobile Country Code (3 digits)
        mnc:
          type: integer
          format: int32
          description: Mobile Network Code (2 o 3 digits)
        lac:
          type: integer
          format: int32
          description: Location Area Code
      example: {
        "LAI": {
          "mcc": 748,
          "mnc": 1,
          "lac": 119
        }
      }

    TAI:
      type: object
      description: Tracking Area Identification
      properties:
        mcc:
          type: integer
          format: int32
          description: Mobile Country Code (3 digits)
        mnc:
          type: integer
          format: int32
          description: Mobile Network Code (2 o 3 digits)
        tac:
          type: integer
          format: int32
