        }
      }

    ECGI:
      type: object
      description: E-UTRAN Cell Global Identification
      properties:
        mcc:
          type: integer
          format: int32
          description: Mobile Country Code (3 digits)
        mnc:
          type: integer
          format: int32
          description: Mobile Network Code (2 o 3 digits)
        eci:
          type: integer
          format: int32
          description: LTE Cell Identity (ECI=eNBId+CI).
        eNBId:
          type: integer
