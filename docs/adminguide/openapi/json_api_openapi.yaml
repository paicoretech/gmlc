  /psl:
    post:
      tags:
        - MAP PSL
      summary: SS7 MAP Provide Subscriber Location (PSL) request
      description: Request subscriber information from the MSC/VLR or SGSN via a SS7 MAP PSL after a previous SS7 MAP Send Routing Information for Location Services (SRILCS) request.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MAP_SRILCS_PSL_Request'
            examples:
              pslEmergencyServicesCurrentLocation:
                summary: MAP PSL Request example executed by an emergency services client for current location
                value:
                  msisdn: 59899077937
                  lcsClientType: 0
                  lcsClientExternalID: 6543210987
                  lcsLocationType: currentLocation
                  clientReferenceNumber: 30000
                  token: RmVybmFuZG9NZW5kaW9yb3o
              pslVasCurrentOrLastKnownLocation:
                summary: MAP PSL Request example executed by a value-added services client for current or last known location
                value:
