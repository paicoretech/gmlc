    LocationEstimateLg:
      type: object
      properties:
        typeOfShape:
          enum:
            - EllipsoidPoint
            - EllipsoidPointWithUncertaintyCircle
            - EllipsoidPointWithUncertaintyEllipse
            - Polygon
            - EllipsoidPointWithAltitude
            - EllipsoidPointWithAltitudeAndUncertaintyEllipsoid
            - ellipsoidArc
          description: Indicates the Geographical Area Definitions supported as per 3GPP TS 23.032 Possible values are `EllipsoidPoint`, `EllipsoidPointWithUncertaintyCircle`, `EllipsoidPointWithUncertaintyEllipse`, `Polygon`, `EllipsoidPointWithAltitude`, `EllipsoidPointWithAltitudeAndUncertaintyEllipsoid` and `ellipsoidArc`.
        latitude:
          type: number
          format: double
          description: expressed in the range -90&#186;, +90&#186;, negative decimal values refer to South degrees of latitude, while positive to North degrees of latitude.
        longitude:
          type: number
          format: double
          description: expressed in the range -180&#186;, +180&#186;, negative decimal values refer to West degrees of longitude, while positive to East degrees of longitude.
        uncertainty:
          type: number
          format: double
          description: method of describing the uncertainty for latitude and longitude (in metres).
        uncertaintySemiMajorAxis:
          type: number
          format: double
          description: Semi-major axis uncertainty (in meters) of the location estimate shape. Only applies to types of shapes `EllipsoidPointWithUncertaintyEllipse` and `EllipsoidPointWithAltitudeAndUncertaintyEllipsoid`.
        uncertaintySemiMinorAxis:
          type: number
          format: double
          description: Semi-minor axis uncertainty (in meters) of the location estimate shape. Only applies to types of shapes `EllipsoidPointWithUncertaintyEllipse` and `EllipsoidPointWithAltitudeAndUncertaintyEllipsoid`.
        angleOfMajorAxis:
          type: number
          format: double
          description: Orientation of major axis of the location estimate shape. Only applies to types of shapes `EllipsoidPointWithUncertaintyEllipse` and `EllipsoidPointWithAltitudeAndUncertaintyEllipsoid`.
        confidence:
          type: integer
          format: int32
          description: The confidence by which the position of a target entity is known to be within the location estimate shape description (expressed as a percentage). Only applies to types of shapes `EllipsoidPointWithUncertaintyEllipse`, `EllipsoidPointWithAltitudeAndUncertaintyEllipsoid` and `EllipsoidArc`.
        innerRadius:
          type: number
          format: double
          description: Inner radius (in meters) of the location estimate shape. Only applies to type of shape `EllipsoidArc`.
        uncertaintyInnerRadius:
          type: number
          format: double
          description: Inner radius uncertainty (in meters) of the location estimate shape. Only applies to type of shape `EllipsoidArc`.
        offsetAngle:
          type: number
          format: double
          description: Offset angle of the location estimate shape. Only applies to type of shape `EllipsoidArc`.
        includedAngle:
          type: number
          format: double
          description: Included angle of the location estimate shape. Only applies to type of shape `EllipsoidArc`.
        altitude:
          type: integer
          format: int32
          description: Altitude (in meters) of the location estimate shape. Only applies to types of shapes `EllipsoidPointWithAltitude`, `EllipsoidPointWithAltitudeAndUncertaintyEllipsoid`.
        uncertaintyAltitude:
          type: number
          format: double
          description: Altitude uncertainty (in meters) of the location estimate shape. Only applies to type of shape `EllipsoidPointWithAltitudeAndUncertaintyEllipsoid`.
      example: {
        "LocationEstimate": {
          "typeOfShape": "EllipsoidPointWithAltitudeAndUncertaintyEllipsoid",
          "latitude": 6.195592,
          "longitude": -75.558107,
          "altitude": 200,
          "uncertaintySemiMajorAxis": 2.1,
          "uncertaintySemiMinorAxis": 2.1,
          "angleOfMajorAxis": 4.0,
          "uncertaintyAltitude": 11.198834,
          "confidence": 80
        }
      }
    
    AdditionalLocationEstimate:
      type: object
      description: contains an estimate of the location of the UE in universal coordinates and other parameters when the **LocationEstimate** type of shape is either `Polygon` or `EllipsoidPointWithAltitude`.
      properties:
        typeOfShape:
          type: string
