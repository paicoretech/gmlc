          $ref: '#/components/schemas/EPSLocationInformation'
      example: {
        "CSLocationInformation": {
          "LocationNumber": {
            "oddFlag": false,
            "natureOfAddressIndicator": 4,
            "internalNetworkNumberIndicator": 1,
            "numberingPlanIndicator": 1,
            "addressPresentationRestrictedIndicator": 1,
            "screeningIndicator": 3,
            "address": 819203961904
          },
          "CGI": {
            "mcc": 748,
            "mnc": 1,
            "lac": 101,
            "ci": 10263
          },
          "saiPresent": false,
          "GeographicalInformation": {
            "typeOfShape": "EllipsoidPointWithUncertaintyCircle",
            "latitude": -34.909734,
            "longitude": -56.146317,
            "uncertainty": 3.0
          },
          "ageOfLocationInformation": 0,
          "currentLocationRetrieved": true,
          "vlrNumber": 59899000231,
          "mscNumber": 59899000231
        }
      }

    EPSLocationInformation:
      type: object
      description: Comprises the location information of the target subscriber under 4G LTE coverage, gathered by the MSC/VLR or HSS from the Evolved-Packet-Switched (EPS) network node such as an MME. It can be contained as a field within the **CSLocationInformation** attribute of the response object.
      properties:
