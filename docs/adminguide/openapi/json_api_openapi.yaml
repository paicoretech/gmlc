          },
          "polygonPoint4": {
            "latitude": -3.040016,
            "longitude": 70.681894
          },
          "polygonPoint5": {
            "latitude": -3.044994,
            "longitude": 70.70009
          },
          "polygonPoint6": {
            "latitude": -2.989,
            "longitude": 71.000004
          },
          "polygonCentroid": {
